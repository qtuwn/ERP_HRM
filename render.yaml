services:
  - type: web
    runtime: docker
    name: erp-hrm
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    healthCheckPath: /
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: erp-hrm-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: erp-hrm-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: erp-hrm-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: JAVA_OPTS
        value: -Xms256m -Xmx512m

databases:
  - name: erp-hrm-db
    databaseName: erp_hrm
    user: admin
