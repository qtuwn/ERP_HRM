services:
  - type: web
    runtime: docker
    name: erp-hrm
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    healthCheckPath: /
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: JAVA_OPTS
        value: -Xms256m -Xmx512m
