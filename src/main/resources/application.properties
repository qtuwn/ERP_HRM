spring.application.name=VTHR Solutions
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.thymeleaf.cache=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:defaultSecret}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-secret=${REFRESH_JWT_SECRET:defaultRefreshSecret}

# Email Configuration
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}

# AI Configuration
spring.ai.gemini.api-key=${GEMINI_API_KEY:}
