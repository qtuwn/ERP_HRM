spring.application.name=VTHR Solutions
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.thymeleaf.cache=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=9

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:a_very_long_secure_default_secret_key_for_jwt_256_bits}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-secret=${REFRESH_JWT_SECRET:a_very_long_secure_default_refresh_secret_key_for_jwt}

# Email Configuration
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email App Configuration
app.mail.from=${MAIL_FROM:noreply@vthr.com}
app.mail.from-name=${MAIL_FROM_NAME:VTHR Solutions}

# AI Configuration
gemini.api.key=${GEMINI_API_KEY:}
