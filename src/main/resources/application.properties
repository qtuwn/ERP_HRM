spring.application.name=VTHR Solutions
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Upload CV / resume (ứng viên): đủ cho PDF/DOCX tới 5MB + multipart overhead
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Thư mục lưu file (resumes nằm trong {upload-dir}/resumes)
file.upload-dir=${FILE_UPLOAD_DIR:uploads}

server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.driver-class-name=org.postgresql.Driver
# SQL log: bật trong application-dev.properties (tránh overhead ở base/prod)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Gom INSERT/UPDATE theo batch (giảm round-trip DB khi save nhiều entity)
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.hibernate.ddl-auto=update
spring.thymeleaf.cache=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=9
spring.flyway.validate-on-migrate=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=false

# Auth OTP configuration
auth.otp-expiration-minutes=5
auth.otp-resend-cooldown-seconds=60
# Khoảng cách tối thiểu giữa hai lần yêu cầu OTP quên mật khẩu (theo user)
auth.password-reset-cooldown-seconds=${AUTH_PASSWORD_RESET_COOLDOWN_SECONDS:60}
# Link đặt lại MK (magic link) — thời lượng token
auth.password-reset-link-expiration-hours=${AUTH_PWRESET_LINK_HOURS:1}
# Giới hạn theo IP (in-memory / instance) — chống spam request & brute confirm
auth.password-reset-request-ip-max=${AUTH_PWRESET_REQ_IP_MAX:5}
auth.password-reset-request-ip-window-seconds=${AUTH_PWRESET_REQ_IP_WINDOW:900}
auth.password-reset-confirm-ip-max=${AUTH_PWRESET_CONF_IP_MAX:30}
auth.password-reset-confirm-ip-window-seconds=${AUTH_PWRESET_CONF_IP_WINDOW:900}
# Sau N lần nhập sai OTP đặt lại MK (theo email), khóa tạm
auth.password-reset-max-failed-confirm-per-email=${AUTH_PWRESET_MAX_FAIL:5}
auth.password-reset-lockout-seconds=${AUTH_PWRESET_LOCKOUT:900}

# Demo nhanh (không cần SMTP): log magic-link verify email ra console
auth.email-verification-demo-log-only=${AUTH_EMAIL_DEMO_LOG_ONLY:false}

# Quên mật khẩu qua OTP / link email — tắt mặc định; bật: true + SMTP (AUTH_PASSWORD_RESET_EMAIL_ENABLED=true)
app.auth.password-reset-email-enabled=${AUTH_PASSWORD_RESET_EMAIL_ENABLED:false}

# Disable Spring Data Redis repositories scanning (we use RedisTemplate/queues only)
spring.data.redis.repositories.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:a_very_long_secure_default_secret_key_for_jwt_256_bits}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-secret=${REFRESH_JWT_SECRET:a_very_long_secure_default_refresh_secret_key_for_jwt}

# --- Email / OTP (Spring Mail — cùng mô hình với spring-boot-starter-mail + Gmail) ---
# Tham khảo: https://github.com/amaanalikhan3000/EmailOtp
# Gmail: host=smtp.gmail.com, port=587, auth=true, starttls.enable=true, dùng App Password (không dùng mật khẩu đăng nhập thường).
# Biến môi trường: MAIL_* hoặc SMTP_* (xem .env.example).
spring.mail.host=${MAIL_HOST:${SMTP_HOST:localhost}}
spring.mail.port=${MAIL_PORT:${SMTP_PORT:587}}
spring.mail.username=${MAIL_USER:${SMTP_USER:}}
spring.mail.password=${MAIL_PASS:${SMTP_PASS:}}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Tin cậy host SMTP (một số môi trường cần * hoặc tên host — có thể ghi đè bằng MAIL_SMTP_SSL_TRUST)
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:${MAIL_HOST:${SMTP_HOST:${spring.mail.host}}}}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Bật khi debug lỗi kết nối SMTP (chỉ tạm thời)
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

# Email App Configuration
# Gmail: From nên trùng email đăng nhập SMTP (hoặc alias trong Gmail). Mặc định lấy theo SMTP_USER/MAIL_USER nếu không set MAIL_FROM.
app.mail.from=${MAIL_FROM:${SMTP_USER:${MAIL_USER:noreply@vthr.com}}}
app.mail.from-name=${MAIL_FROM_NAME:VTHR Solutions}

# URL backend (magic link verify email API) & URL web (SPA — link đặt lại MK trong email)
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.public-web-url=${APP_PUBLIC_WEB_URL:${app.base-url}}

# AI Configuration — tắt mặc định (đặc tả base flow không bắt buộc AI). Bật: true + GEMINI_API_KEY + Redis queue.
app.ai.screening.enabled=${APP_AI_SCREENING_ENABLED:false}
gemini.api.key=${GEMINI_API_KEY:}
