spring.application.name=VTHR Solutions
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Upload CV / resume (ứng viên): đủ cho PDF/DOCX tới 5MB + multipart overhead
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Thư mục lưu file (resumes nằm trong {upload-dir}/resumes)
file.upload-dir=${FILE_UPLOAD_DIR:uploads}

server.port=${PORT:${SERVER_PORT:8080}}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.thymeleaf.cache=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=9
spring.flyway.validate-on-migrate=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=false

# Auth OTP configuration
auth.otp-expiration-minutes=5
auth.otp-resend-cooldown-seconds=60

# Demo nhanh (không cần SMTP): log magic-link verify email ra console
auth.email-verification-demo-log-only=${AUTH_EMAIL_DEMO_LOG_ONLY:false}

# Disable Spring Data Redis repositories scanning (we use RedisTemplate/queues only)
spring.data.redis.repositories.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:a_very_long_secure_default_secret_key_for_jwt_256_bits}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-secret=${REFRESH_JWT_SECRET:a_very_long_secure_default_refresh_secret_key_for_jwt}

# Email Configuration
spring.mail.host=${MAIL_HOST:${SMTP_HOST:localhost}}
spring.mail.port=${MAIL_PORT:${SMTP_PORT:587}}
spring.mail.username=${MAIL_USER:${SMTP_USER:}}
spring.mail.password=${MAIL_PASS:${SMTP_PASS:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:${SMTP_HOST:${spring.mail.host}}}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email App Configuration
app.mail.from=${MAIL_FROM:noreply@vthr.com}
app.mail.from-name=${MAIL_FROM_NAME:VTHR Solutions}

# AI Configuration — tắt mặc định (đặc tả base flow không bắt buộc AI). Bật: true + GEMINI_API_KEY + Redis queue.
app.ai.screening.enabled=${APP_AI_SCREENING_ENABLED:false}
gemini.api.key=${GEMINI_API_KEY:}
