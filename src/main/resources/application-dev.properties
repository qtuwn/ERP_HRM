spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erp_hrm}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:0000}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Bật khi cần soi N+1 / số lượng query (log Hibernate statistics — chỉ dev)
# spring.jpa.properties.hibernate.generate_statistics=true
# logging.level.org.hibernate.stat=DEBUG

# Dev bootstrap: tạo tài khoản ADMIN mặc định nếu DB chưa có admin
app.bootstrap.admin.enabled=true
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@vthr.com}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:Admin@123}
app.bootstrap.admin.full-name=${APP_BOOTSTRAP_ADMIN_FULL_NAME:System Admin}
