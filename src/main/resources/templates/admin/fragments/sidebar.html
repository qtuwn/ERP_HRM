<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Sidebar: Alpine globalState() — active: bg-blue-50 + text-blue-600 (dark: tương đương) -->
<aside th:fragment="sidebar"
       class="fixed inset-y-0 left-0 z-40 w-64 flex flex-col border-r border-slate-200 bg-white shadow-sm transition-transform duration-200 ease-out dark:border-slate-800 dark:bg-slate-950"
       :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
       aria-label="Điều hướng quản trị">
    <div class="flex h-14 items-center gap-2 border-b border-slate-200 px-4 dark:border-slate-800">
        <a href="/dashboard" class="flex min-w-0 items-center gap-2">
            <img src="/images/vthr-group-logo.png" alt="VTHR" class="h-8 w-8 shrink-0 rounded-lg object-cover"
                 onerror="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden'); this.nextElementSibling.classList.add('flex');"/>
            <div class="hidden h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-[#2563eb] text-sm font-bold text-white">V</div>
            <div class="min-w-0">
                <p class="truncate text-sm font-semibold text-slate-900 dark:text-white">VTHR Careers Hub</p>
                <p class="truncate text-xs text-slate-500 dark:text-slate-400">Quản trị tuyển dụng</p>
            </div>
        </a>
    </div>

    <nav class="flex-1 space-y-1 overflow-y-auto px-3 py-4">
        <a href="/dashboard"
           class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors"
           :class="navDashboard() ? 'bg-blue-50 font-semibold text-blue-600 dark:bg-blue-950/50 dark:text-blue-300' : 'text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-900'">
            <i data-lucide="layout-dashboard" class="h-5 w-5 shrink-0 text-slate-500 group-hover:text-blue-600 dark:text-slate-400 dark:group-hover:text-blue-300"
               :class="navDashboard() ? '!text-[#2563eb] dark:!text-blue-300' : ''"></i>
            <span>Tổng quan</span>
        </a>

        <a href="/jobs/management"
           class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors"
           :class="navJobsManagement() ? 'bg-blue-50 font-semibold text-blue-600 dark:bg-blue-950/50 dark:text-blue-300' : 'text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-900'">
            <i data-lucide="briefcase" class="h-5 w-5 shrink-0 text-slate-500 group-hover:text-blue-600 dark:text-slate-400 dark:group-hover:text-blue-300"
               :class="navJobsManagement() ? '!text-[#2563eb] dark:!text-blue-300' : ''"></i>
            <span>Quản lý tin tuyển</span>
        </a>

        <a href="/jobs/management"
           class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors"
           :class="navApplicationTracking() ? 'bg-blue-50 font-semibold text-blue-600 dark:bg-blue-950/50 dark:text-blue-300' : 'text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-900'">
            <i data-lucide="clipboard-list" class="h-5 w-5 shrink-0 text-slate-500 group-hover:text-blue-600 dark:text-slate-400 dark:group-hover:text-blue-300"
               :class="navApplicationTracking() ? '!text-[#2563eb] dark:!text-blue-300' : ''"></i>
            <span>Theo dõi hồ sơ</span>
        </a>
        <p class="px-3 pb-1 pt-0 text-[11px] leading-snug text-slate-500 dark:text-slate-500">
            Mở từng tin → <span class="text-slate-600 dark:text-slate-400">Ứng viên (Kanban)</span>
        </p>

        <a href="/admin/users"
           x-show="user &amp;&amp; user.role === 'ADMIN'"
           class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors"
           :class="navAdminUsers() ? 'bg-blue-50 font-semibold text-blue-600 dark:bg-blue-950/50 dark:text-blue-300' : 'text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-900'">
            <i data-lucide="users" class="h-5 w-5 shrink-0 text-slate-500 group-hover:text-blue-600 dark:text-slate-400 dark:group-hover:text-blue-300"
               :class="navAdminUsers() ? '!text-[#2563eb] dark:!text-blue-300' : ''"></i>
            <span>Quản lý tài khoản</span>
        </a>

        <a href="/company/staff"
           x-show="user &amp;&amp; user.role === 'COMPANY'"
           class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors"
           :class="navCompanyStaff() ? 'bg-blue-50 font-semibold text-blue-600 dark:bg-blue-950/50 dark:text-blue-300' : 'text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-900'">
            <i data-lucide="users" class="h-5 w-5 shrink-0 text-slate-500 group-hover:text-blue-600 dark:text-slate-400 dark:group-hover:text-blue-300"
               :class="navCompanyStaff() ? '!text-[#2563eb] dark:!text-blue-300' : ''"></i>
            <span>Nhân sự công ty</span>
        </a>
    </nav>

    <div class="border-t border-slate-200 p-3 dark:border-slate-800">
        <button type="button"
                @click="toggleDarkMode()"
                class="flex w-full items-center justify-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">
            <i data-lucide="moon" class="h-4 w-4 dark:hidden"></i>
            <i data-lucide="sun" class="hidden h-4 w-4 dark:block"></i>
            <span x-text="isDarkMode ? 'Chế độ sáng' : 'Chế độ tối'"></span>
        </button>
    </div>
</aside>
</body>
</html>
