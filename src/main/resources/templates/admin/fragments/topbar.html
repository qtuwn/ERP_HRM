<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Topbar: chỉ logo + profile/logout + nút mở sidebar (mobile) — không còn menu điều hướng chính -->
<header th:fragment="topbar"
        class="sticky top-0 z-30 flex h-14 items-center justify-between gap-4 border-b border-slate-200 bg-white px-4 dark:border-slate-800 dark:bg-slate-950 lg:px-6">
    <div class="flex min-w-0 items-center gap-3">
        <button type="button"
                class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-900 lg:hidden"
                @click="sidebarOpen = true"
                aria-label="Mở menu">
            <i data-lucide="menu" class="h-5 w-5"></i>
        </button>
        <a href="/dashboard" class="flex min-w-0 items-center gap-2">
            <img src="/images/vthr-group-logo.png" alt="VTHR" class="h-8 w-8 shrink-0 rounded-lg object-cover"
                 onerror="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden'); this.nextElementSibling.classList.add('flex');"/>
            <div class="hidden h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-[#2563eb] text-sm font-bold text-white">V</div>
            <span class="truncate text-base font-semibold tracking-tight text-slate-900 dark:text-white">VTHR</span>
        </a>
    </div>

    <div class="flex items-center gap-2 sm:gap-3">
        <button type="button"
                @click="toggleDarkMode()"
                class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-900"
                title="Chế độ sáng/tối">
            <i data-lucide="moon" class="h-4 w-4 dark:hidden"></i>
            <i data-lucide="sun" class="hidden h-4 w-4 dark:block"></i>
        </button>

        <template x-if="!user">
            <a href="/login" class="rounded-lg bg-[#2563eb] px-3 py-2 text-sm font-medium text-white transition hover:bg-[#1d4ed8]">
                Đăng nhập
            </a>
        </template>

        <template x-if="user">
            <div class="relative" x-data="{ open: false }">
                <button type="button" @click="open = !open" @click.away="open = false"
                        class="flex max-w-[220px] items-center gap-2 rounded-lg border border-slate-200 py-1.5 pl-1.5 pr-2 text-left hover:bg-slate-50 dark:border-slate-700 dark:hover:bg-slate-900 sm:max-w-xs">
                    <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-[#2563eb]/15 text-sm font-semibold text-[#1d4ed8] dark:bg-[#2563eb]/25 dark:text-white"
                          x-text="user.fullName ? user.fullName.charAt(0) : '?'"></span>
                    <span class="min-w-0 flex-1">
                        <span class="block truncate text-sm font-medium text-slate-900 dark:text-white" x-text="user.fullName"></span>
                        <span class="block truncate text-xs text-slate-500 dark:text-slate-400" x-text="user.role"></span>
                    </span>
                    <i data-lucide="chevron-down" class="h-4 w-4 shrink-0 text-slate-400"></i>
                </button>
                <div x-show="open"
                     x-transition
                     class="absolute right-0 mt-2 w-52 overflow-hidden rounded-lg border border-slate-200 bg-white py-1 shadow-lg dark:border-slate-700 dark:bg-slate-900"
                     style="display: none;">
                    <a href="/profile" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 dark:text-slate-200 dark:hover:bg-slate-800">Hồ sơ của tôi</a>
                    <button type="button" @click="logout()" class="block w-full px-4 py-2 text-left text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-950/40">Đăng xuất</button>
                </div>
            </div>
        </template>
    </div>
</header>
</body>
</html>
