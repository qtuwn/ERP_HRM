<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Kanban Board', ~{::section})}">
<head>
    <title>Applicants Board</title>
</head>
<body>
<section>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-data="kanbanBoard()">
        <div class="mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-900">Job Applications Kanban</h1>
            <div class="flex items-center space-x-3">
                <button x-show="selectedAppIds.length > 0"
                        @click="bulkReject()"
                        class="bg-red-600 border border-transparent text-white hover:bg-red-700 px-4 py-2 rounded shadow-sm hover:shadow transition text-sm font-medium">
                    Reject Selected (<span x-text="selectedAppIds.length"></span>)
                </button>
                <a th:href="@{/jobs}" class="text-indigo-600 bg-white hover:bg-gray-50 border px-4 py-2 rounded shadow-sm hover:shadow transition">Back to Jobs</a>
            </div>
        </div>

        <div th:if="${error}" class="bg-red-50 text-red-600 p-4 rounded-md mb-6" th:text="${error}"></div>
        
        <div class="flex space-x-4 overflow-x-auto pb-4" style="min-height: 70vh;">
            <!-- Render lanes for each status dynamically using Alpine.js -->
            <template x-for="lane in lanes" :key="lane.id">
                <div class="flex-shrink-0 w-80 bg-gray-100 rounded-lg p-4 flex flex-col shadow-sm border border-gray-200">
                    <h2 class="text-sm font-semibold text-gray-700 uppercase mb-4" x-text="lane.title + ' (' + getLaneCount(lane.id) + ')'"></h2>
                    
                    <!-- Drop Zone -->
                    <div class="flex-1 space-y-3 overflow-y-auto"
                         @dragover.prevent="dragOverLane = lane.id"
                         @dragleave.prevent="dragOverLane = null"
                         @drop.prevent="dropOnLane(lane.id)"
                         :class="(dragOverLane === lane.id) ? 'bg-indigo-50 border-2 border-dashed border-indigo-300 rounded-md p-2 -m-2' : ''">
                         
                        <template x-for="app in getAppsByLane(lane.id)" :key="app.id">
                            <!-- Draggable Card -->
                            <div class="bg-white p-4 rounded-md shadow border border-gray-200 cursor-move hover:border-indigo-400 hover:shadow-md transition duration-150"
                                 draggable="true"
                                 @dragstart="dragStart(app)"
                                 @dragend="dragEnd()">
                                <div class="flex justify-between items-start mb-2">
                                    <div class="flex items-center gap-2 overflow-hidden">
                                        <input type="checkbox"
                                               :checked="selectedAppIds.includes(app.id)"
                                               @change="toggleSelection(app.id)"
                                               @click.stop
                                               class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded flex-shrink-0 cursor-pointer">
                                        <h3 class="font-medium text-gray-900 text-sm truncate pr-2" x-text="app.candidateName"></h3>
                                    </div>
                                    <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold"
                                          :class="getScoreColor(app.aiScore)"
                                          x-text="app.aiScore ? 'AI: ' + app.aiScore : 'AI: N/A'">
                                    </span>
                                </div>
                                <a :href="'mailto:' + app.candidateEmail" class="text-xs text-gray-500 hover:text-indigo-600 hover:underline truncate block mb-1" x-text="app.candidateEmail"></a>
                                
                                <div class="mt-3 flex gap-3 items-center">
                                    <a x-show="app.cvUrl" :href="app.cvUrl" target="_blank" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium flex items-center">
                                        <svg class="h-3 w-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                                        CV
                                    </a>
                                    <div x-show="app.aiStatus === 'EVALUATING'" class="text-xs font-medium text-yellow-600 animate-pulse flex items-center">
                                        <svg class="animate-spin -ml-1 mr-1 h-3 w-3 text-yellow-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                        Evaluating...
                                    </div>
                                    <div x-show="app.aiStatus === 'COMPLETED'" class="text-xs font-medium text-green-600 flex items-center">
                                        <svg class="h-3 w-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                        Screened
                                    </div>
                                    <button @click.stop="$dispatch('open-chat', { applicationId: app.id, applicationTitle: app.candidateName })" 
                                            class="text-xs text-blue-600 hover:text-blue-800 font-medium flex items-center ml-auto bg-blue-50 px-2 py-1 rounded">
                                        <svg class="h-3 w-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                                        Chat
                                    </button>
                                </div>
                            </div>
                        </template>
                        
                        <div x-show="getLaneCount(lane.id) === 0" class="text-sm text-gray-400 text-center py-6 italic border-2 border-dashed border-gray-200 rounded-md">
                            No candidates
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Alpine.js logic for Kanban -->
    <script>
        function kanbanBoard() {
            return {
                lanes: [
                    { id: 'APPLIED', title: 'Applied' },
                    { id: 'AI_SCREENING', title: 'AI Screening' },
                    { id: 'HR_REVIEW', title: 'HR Review' },
                    { id: 'INTERVIEW', title: 'Interview' },
                    { id: 'OFFER', title: 'Offer' },
                    { id: 'HIRED', title: 'Hired' },
                    { id: 'REJECTED', title: 'Rejected' },
                ],
                applications: [],
                selectedAppIds: [],
                draggingApp: null,
                dragOverLane: null,
                jobId: null,
                
                showInterviewModal: false,
                pendingInterviewApp: null,
                interviewForm: {
                    interviewTime: '',
                    locationOrLink: ''
                },

                async init() {
                    const pathParts = window.location.pathname.split('/');
                    const jobIdx = pathParts.indexOf('jobs');
                    if (jobIdx >= 0 && jobIdx + 1 < pathParts.length) {
                        this.jobId = pathParts[jobIdx + 1];
                        console.log('Detected jobId:', this.jobId);
                        await this.fetchApplications();
                    }
                },

                async fetchApplications() {
                    try {
                        const res = await api.get(`/api/jobs/${this.jobId}/applications/kanban`);
                        if(res.success) {
                            this.applications = res.data;
                            console.log("Kanban loaded items:", this.applications.length);
                        } else {
                            api.showError("Failed to fetch Kanban data", res.message);
                        }
                    } catch(err) {
                        console.error(err);
                        api.showError("Error", "Could not fetch Kanban applications");
                    }
                },

                getAppsByLane(statusField) {
                    return this.applications.filter(a => a.status === statusField);
                },

                getLaneCount(statusField) {
                    return this.getAppsByLane(statusField).length;
                },

                getScoreColor(score) {
                    if (!score && score !== 0) return 'bg-gray-100 text-gray-800';
                    if (score >= 80) return 'bg-green-100 text-green-800';
                    if (score >= 50) return 'bg-yellow-100 text-yellow-800';
                    return 'bg-red-100 text-red-800 border bg-opacity-70 border-red-200';
                },

                toggleSelection(id) {
                    if (this.selectedAppIds.includes(id)) {
                        this.selectedAppIds = this.selectedAppIds.filter(x => x !== id);
                    } else {
                        this.selectedAppIds.push(id);
                    }
                },

                async bulkReject() {
                    if (this.selectedAppIds.length === 0) return;
                    if (!confirm(`Are you sure you want to reject ${this.selectedAppIds.length} candidate(s)?`)) return;
                    
                    try {
                        const res = await api.post('/api/applications/bulk-reject', {
                            applicationIds: this.selectedAppIds
                        });
                        if (res.success) {
                            alert('Bulk rejection completed successfully.');
                            this.selectedAppIds = [];
                            await this.fetchApplications();
                        } else {
                            alert('Bulk Reject Failed: ' + res.message);
                        }
                    } catch (err) {
                        console.error(err);
                        alert('Failed to perform bulk rejection.');
                    }
                },

                dragStart(app) {
                    this.draggingApp = app;
                },

                dragEnd() {
                    this.draggingApp = null;
                    this.dragOverLane = null;
                },

                async dropOnLane(newStatus) {
                    const app = this.draggingApp;
                    this.dragOverLane = null;
                    
                    if (!app || app.status === newStatus) return;

                    const originalStatus = app.status;
                    
                    if (newStatus === 'INTERVIEW') {
                        app.originalStatus = originalStatus;
                        this.pendingInterviewApp = app;
                        this.showInterviewModal = true;
                        return; // Halt standard patch execution natively
                    }
                    
                    // Optimistic UI Update
                    app.status = newStatus;

                    try {
                        const res = await api.patch(`/api/applications/${app.id}/status`, {
                            status: newStatus,
                            note: `Moved to ${newStatus} via Kanban board`
                        });
                        
                        if(!res.success) {
                            // Rollback
                            app.status = originalStatus;
                            api.showError("Update Failed", res.message || 'Cannot move across strict boundaries natively without notes (Check rules).');
                        } else {
                            console.log("Successfully transitioned to", newStatus);
                        }
                    } catch(err) {
                        console.error(err);
                        // Rollback
                        app.status = originalStatus;
                        api.showError("Error", "Could not update status safely. State recovered.");
                    }
                },

                cancelInterviewModal() {
                    this.showInterviewModal = false;
                    this.pendingInterviewApp = null;
                    // Reset form cleanly
                    this.interviewForm.interviewTime = '';
                    this.interviewForm.locationOrLink = '';
                },

                async submitInterviewModal() {
                    if(!this.pendingInterviewApp || !this.interviewForm.interviewTime) {
                        api.showError("Missing Data", "Interview Time is dynamically required locally.");
                        return;
                    }
                    
                    const app = this.pendingInterviewApp;
                    app.status = 'INTERVIEW'; // Optimistic
                    this.showInterviewModal = false;

                    try {
                        const isoDate = new Date(this.interviewForm.interviewTime).toISOString();
                        const res = await api.post(`/api/applications/${app.id}/interviews`, {
                            interviewTime: isoDate,
                            locationOrLink: this.interviewForm.locationOrLink
                        });
                        
                        if(res.success) {
                            console.log("Successfully intercepted and scheduled INTERVIEW uniquely!");
                            app.originalStatus = null;
                            this.cancelInterviewModal(); // Reset form variables completely
                        } else {
                            app.status = app.originalStatus || 'APPLIED';
                            app.originalStatus = null;
                            api.showError("Scheduling Failed", res.message || 'Cannot map schedule correctly');
                        }
                    } catch(err) {
                        console.error(err);
                        app.status = app.originalStatus || 'APPLIED';
                        app.originalStatus = null;
                        api.showError("Error", "Could not dispatch Schedule properties reliably");
                    }
                }
            }
        }
    </script>
    
    <!-- Interview Schedule Modal -->
    <div x-show="showInterviewModal" class="fixed inset-0 z-50 overflow-y-auto" style="display: none;">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
            <!-- Overlay -->
            <div x-show="showInterviewModal" x-transition.opacity class="fixed inset-0 transition-opacity bg-gray-500 bg-opacity-75" aria-hidden="true" @click="cancelInterviewModal()"></div>

            <!-- Modal Panel -->
            <div x-show="showInterviewModal" 
                 x-transition:enter="ease-out duration-300" 
                 x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" 
                 x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" 
                 x-transition:leave="ease-in duration-200" 
                 x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100" 
                 x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" 
                 class="inline-block px-4 pt-5 pb-4 overflow-hidden text-left align-bottom transition-all transform bg-white rounded-lg shadow-xl sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6">
                 
                <div>
                    <div class="flex items-center justify-center w-12 h-12 mx-auto bg-indigo-100 rounded-full">
                        <svg class="w-6 h-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div class="mt-3 text-center sm:mt-5">
                        <h3 class="text-lg font-medium leading-6 text-gray-900" id="modal-title">
                            Schedule Interview
                        </h3>
                        <div class="mt-2 text-sm text-gray-500">
                            Please provide the interview details for <span class="font-bold text-gray-700" x-text="pendingInterviewApp?.candidateName"></span>. This will send an invitation email instantly.
                        </div>
                    </div>
                </div>
                
                <div class="mt-5 space-y-4 text-left">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Interview Date & Time <span class="text-red-500">*</span></label>
                        <input type="datetime-local" x-model="interviewForm.interviewTime" class="block w-full mt-1 border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Location, Map, or Meeting Link</label>
                        <input type="text" x-model="interviewForm.locationOrLink" placeholder="e.g. 1st Floor Room 2A, or Google Meet link..." class="block w-full mt-1 border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                </div>
                
                <div class="mt-5 sm:mt-6 sm:flex sm:flex-row-reverse">
                    <button type="button" @click="submitInterviewModal()" class="inline-flex justify-center w-full px-4 py-2 text-base font-medium text-white bg-indigo-600 border border-transparent rounded-md shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:ml-3 sm:w-auto sm:text-sm">
                        Confirm & Schedule
                    </button>
                    <button type="button" @click="cancelInterviewModal()" class="inline-flex justify-center w-full px-4 py-2 mt-3 text-base font-medium text-gray-700 bg-white border border-gray-300 rounded-md shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:w-auto sm:text-sm">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{fragments/chat-widget :: chatWidget}"></div>
</section>
</body>
</html>
