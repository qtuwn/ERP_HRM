<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Bảng điều khiển phân tích', ~{::content})}">
<head>
    <title>Bảng điều khiển phân tích</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="w-full px-4 sm:px-6 lg:px-8 py-8" x-data="dashboardAnalytics()">
        <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Phân tích nền tảng</h1>
                <p class="text-sm text-slate-500 dark:text-slate-400">Tổng quan việc làm, hồ sơ và tỷ lệ tuyển thành công.</p>
            </div>
            <button type="button"
                    @click="fetchStats()"
                    class="inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-[#2563eb] shadow-sm transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:text-[#60a5fa] dark:hover:bg-slate-800">
                <i data-lucide="refresh-cw" class="h-4 w-4 shrink-0"></i>
                Làm mới
            </button>
        </div>

        <!-- Thẻ thống kê — Lucide, phong cách tối giản -->
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4 mb-8">
            <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm transition-shadow duration-200 hover:shadow-lg dark:border-slate-800 dark:bg-slate-900">
                <div class="flex items-start justify-between gap-3">
                    <div class="min-w-0">
                        <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Tổng số công việc</p>
                        <p class="mt-1 text-3xl font-bold tabular-nums text-slate-900 dark:text-white" x-text="stats ? stats.totalJobs : '…'"></p>
                    </div>
                    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-[#2563eb]/10 text-[#2563eb] dark:bg-[#2563eb]/20 dark:text-white">
                        <i data-lucide="briefcase" class="h-5 w-5"></i>
                    </div>
                </div>
            </div>
            <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm transition-shadow duration-200 hover:shadow-lg dark:border-slate-800 dark:bg-slate-900">
                <div class="flex items-start justify-between gap-3">
                    <div class="min-w-0">
                        <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Công việc đang tuyển</p>
                        <p class="mt-1 text-3xl font-bold tabular-nums text-slate-900 dark:text-white" x-text="stats ? stats.activeJobs : '…'"></p>
                    </div>
                    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-[#2563eb]/10 text-[#2563eb] dark:bg-[#2563eb]/20 dark:text-white">
                        <i data-lucide="radio" class="h-5 w-5"></i>
                    </div>
                </div>
            </div>
            <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm transition-shadow duration-200 hover:shadow-lg dark:border-slate-800 dark:bg-slate-900">
                <div class="flex items-start justify-between gap-3">
                    <div class="min-w-0">
                        <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Tổng số hồ sơ</p>
                        <p class="mt-1 text-3xl font-bold tabular-nums text-slate-900 dark:text-white" x-text="stats ? stats.totalApplications : '…'"></p>
                    </div>
                    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-[#2563eb]/10 text-[#2563eb] dark:bg-[#2563eb]/20 dark:text-white">
                        <i data-lucide="inbox" class="h-5 w-5"></i>
                    </div>
                </div>
            </div>
            <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm transition-shadow duration-200 hover:shadow-lg dark:border-slate-800 dark:bg-slate-900">
                <div class="flex items-start justify-between gap-3">
                    <div class="min-w-0">
                        <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Tỷ lệ đạt tổng quan</p>
                        <div class="mt-1 flex items-baseline gap-2">
                            <span class="text-3xl font-bold tabular-nums text-slate-900 dark:text-white" x-text="stats ? stats.passRate + '%' : '…'"></span>
                            <span class="text-sm font-medium text-slate-500 dark:text-slate-400">được tuyển</span>
                        </div>
                    </div>
                    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-[#2563eb]/10 text-[#2563eb] dark:bg-[#2563eb]/20 dark:text-white">
                        <i data-lucide="percent" class="h-5 w-5"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-8 lg:grid-cols-2">
            <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
                <h3 class="mb-4 text-lg font-semibold text-slate-900 dark:text-white">Phân bố phễu hồ sơ</h3>
                <div class="relative flex h-72 items-center justify-center">
                    <div x-show="!stats" class="animate-pulse text-slate-400">Đang tải biểu đồ...</div>
                    <canvas id="pipelineChart" class="h-full w-full max-h-72" x-show="stats"></canvas>
                </div>
            </div>

            <div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
                <div class="border-b border-slate-200 px-6 py-4 dark:border-slate-700">
                    <h3 class="text-lg font-semibold text-slate-900 dark:text-white">Chi tiết theo giai đoạn</h3>
                </div>
                <div class="px-6 py-4">
                    <ul class="divide-y divide-slate-200 dark:divide-slate-700" x-show="stats">
                        <template x-for="(count, status) in stats?.applicationsByStatus" :key="status">
                            <li class="flex items-center justify-between rounded-lg py-3 transition hover:bg-slate-50 dark:hover:bg-slate-800/80">
                                <span class="text-sm font-medium text-slate-600 dark:text-slate-300" x-text="displayStatus(status)"></span>
                                <span class="inline-flex items-center rounded-full bg-slate-100 px-2.5 py-0.5 text-xs font-medium text-slate-800 dark:bg-slate-800 dark:text-slate-200" x-text="count"></span>
                            </li>
                        </template>
                    </ul>
                    <div x-show="!stats" class="py-6 text-center text-sm text-slate-400">Đang tải dữ liệu...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function dashboardAnalytics() {
            return {
                stats: null,
                chartInstance: null,

                async init() {
                    await this.fetchStats();
                },

                refreshLucide() {
                    this.$nextTick(() => {
                        if (typeof lucide !== 'undefined') lucide.createIcons();
                    });
                },

                async fetchStats() {
                    try {
                        const res = await api.get('/api/dashboard/stats');
                        if (res.success) {
                            this.stats = res.data;
                            this.renderChart();
                        } else {
                            window.location.href = '/login?expired=true';
                        }
                    } catch (err) {
                        if (err.status === 401 || err.status === 403) {
                            window.location.href = '/login?expired=true';
                        } else {
                            api.showError('Lỗi mạng', 'Không thể tải dữ liệu bảng điều khiển.');
                        }
                    } finally {
                        this.refreshLucide();
                    }
                },

                displayStatus(status) {
                    const map = {
                        APPLIED: 'Đã nộp',
                        AI_SCREENING: 'Sàng lọc AI',
                        HR_REVIEW: 'Đánh giá HR',
                        INTERVIEW: 'Phỏng vấn',
                        OFFER: 'Đề nghị',
                        HIRED: 'Đã tuyển',
                        REJECTED: 'Từ chối'
                    };
                    return map[status] || status;
                },

                renderChart() {
                    if (!this.stats || !this.stats.applicationsByStatus) return;

                    const ctx = document.getElementById('pipelineChart');
                    if (!ctx) return;

                    if (this.chartInstance) {
                        this.chartInstance.destroy();
                    }

                    const rawData = this.stats.applicationsByStatus;
                    const labels = Object.keys(rawData).map((status) => this.displayStatus(status));
                    const data = Object.values(rawData);

                    const bluesLight = ['#eff6ff', '#dbeafe', '#bfdbfe', '#93c5fd', '#60a5fa', '#3b82f6', '#2563eb'];
                    const n = labels.length;
                    const backgroundColors = labels.map((_, i) => bluesLight[Math.min(i, bluesLight.length - 1)]);
                    const borderColors = labels.map((_, i) => (i % 2 === 0 ? '#2563eb' : '#1d4ed8'));

                    this.chartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: labels,
                            datasets: [{
                                data: data,
                                backgroundColor: backgroundColors,
                                borderColor: borderColors,
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'right',
                                    labels: { color: document.documentElement.classList.contains('dark') ? '#e2e8f0' : '#334155' }
                                }
                            }
                        }
                    });
                }
            }
        }
    </script>
</th:block>
</body>
</html>
