<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Bảng điều khiển phân tích', ~{::section})}">
<head>
    <title>Bảng điều khiển phân tích</title>
</head>
<body>
<section>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-data="dashboardAnalytics()">
        <div class="mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-900">Phân tích nền tảng</h1>
            <button @click="fetchStats()" class="text-indigo-600 hover:text-indigo-900 border px-4 py-2 rounded shadow-sm hover:shadow transition">
                <svg class="h-4 w-4 inline-block -mt-1 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Làm mới
            </button>
        </div>

        <!-- Top Overview Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-indigo-500">
                <div class="text-sm font-medium text-gray-500 truncate">Tổng số công việc</div>
                <div class="mt-1 text-3xl font-bold text-gray-900" x-text="stats ? stats.totalJobs : '...'"></div>
            </div>
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-green-500">
                <div class="text-sm font-medium text-gray-500 truncate">Công việc đang tuyển</div>
                <div class="mt-1 text-3xl font-bold text-gray-900" x-text="stats ? stats.activeJobs : '...'"></div>
            </div>
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-blue-500">
                <div class="text-sm font-medium text-gray-500 truncate">Tổng số hồ sơ</div>
                <div class="mt-1 text-3xl font-bold text-gray-900" x-text="stats ? stats.totalApplications : '...'"></div>
            </div>
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-yellow-500">
                <div class="text-sm font-medium text-gray-500 truncate">Tỷ lệ đạt tổng quan</div>
                <div class="mt-1 text-3xl font-bold text-gray-900 flex items-baseline">
                    <span x-text="stats ? stats.passRate + '%' : '...'"></span>
                    <span class="ml-2 text-sm font-medium text-gray-500">được tuyển</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Pipeline Chart -->
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Phân bố phễu hồ sơ</h3>
                <div class="relative h-72 flex justify-center items-center">
                    <div x-show="!stats" class="text-gray-400 animate-pulse">Đang tải biểu đồ...</div>
                    <canvas id="pipelineChart" class="w-full h-full" x-show="stats"></canvas>
                </div>
            </div>
            
            <!-- Breakdown List -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div class="px-6 py-5 border-b border-gray-200">
                    <h3 class="text-lg font-medium text-gray-900">Chi tiết theo giai đoạn</h3>
                </div>
                <div class="px-6 py-4">
                    <ul class="divide-y divide-gray-200" x-show="stats">
                        <template x-for="(count, status) in stats?.applicationsByStatus" :key="status">
                            <li class="py-3 flex justify-between items-center hover:bg-gray-50 rounded px-2 transition">
                                <span class="text-sm font-medium text-gray-600" x-text="displayStatus(status)"></span>
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800" x-text="count"></span>
                            </li>
                        </template>
                    </ul>
                    <div x-show="!stats" class="text-sm text-center text-gray-400 py-6">Đang tải dữ liệu...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        function dashboardAnalytics() {
            return {
                stats: null,
                chartInstance: null,

                async init() {
                    await this.fetchStats();
                },

                async fetchStats() {
                    try {
                        const res = await api.get('/api/dashboard/stats');
                        if (res.success) {
                            this.stats = res.data;
                            this.renderChart();
                        } else {
                            window.location.href = '/login?expired=true';
                        }
                    } catch (err) {
                        if (err.status === 401 || err.status === 403) {
                            window.location.href = '/login?expired=true';
                        } else {
                            api.showError('Lỗi mạng', 'Không thể tải dữ liệu bảng điều khiển.');
                        }
                    }
                },

                displayStatus(status) {
                    const map = {
                        APPLIED: 'Đã nộp',
                        AI_SCREENING: 'Sàng lọc AI',
                        HR_REVIEW: 'Đánh giá HR',
                        INTERVIEW: 'Phỏng vấn',
                        OFFER: 'Đề nghị',
                        HIRED: 'Đã tuyển',
                        REJECTED: 'Từ chối'
                    };
                    return map[status] || status;
                },

                renderChart() {
                    if (!this.stats || !this.stats.applicationsByStatus) return;

                    const ctx = document.getElementById('pipelineChart');
                    if (!ctx) return;

                    if (this.chartInstance) {
                        this.chartInstance.destroy(); // Destroy previous instance
                    }

                    const rawData = this.stats.applicationsByStatus;
                    const labels = Object.keys(rawData).map((status) => this.displayStatus(status));
                    const data = Object.values(rawData);

                    // Tailwind-inspired organic colors
                    const backgroundColors = [
                        '#E0E7FF', // APPLIED (Indigo 100)
                        '#FEF3C7', // AI_SCREENING (Yellow 100)
                        '#DBEAFE', // HR_REVIEW (Blue 100)
                        '#FCE7F3', // INTERVIEW (Pink 100)
                        '#D1FAE5', // OFFER (Emerald 100)
                        '#A7F3D0', // HIRED (Green 200)
                        '#FEE2E2', // REJECTED (Red 100)
                    ];
                    
                    const borderColors = [
                        '#6366F1', '#F59E0B', '#3B82F6', '#EC4899', '#10B981', '#059669', '#EF4444'
                    ];

                    this.chartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: labels,
                            datasets: [{
                                data: data,
                                backgroundColor: backgroundColors,
                                borderColor: borderColors,
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'right',
                                },
                            },
                        }
                    });
                }
            }
        }
    </script>
</section>
</body>
</html>
