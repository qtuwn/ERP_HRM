<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout('Quản lý tài khoản', ~{::content})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tài khoản</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="w-full max-w-full px-4 sm:px-6 lg:px-8 py-8" x-data="adminUsersPage()">
        <div class="mb-6 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Quản lý tài khoản</h1>
                <p class="text-sm text-slate-500 dark:text-slate-400"
                   x-text="isCompanyRole ? 'Quản lý nhân sự thuộc công ty của bạn.' : 'Quản trị vai trò và trạng thái tài khoản người dùng.'"></p>
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <template x-if="isCompanyRole">
                    <button type="button" @click="openAddHrModal()"
                            class="inline-flex items-center gap-2 rounded-lg bg-[#2563eb] px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-[#1d4ed8]">
                        <i data-lucide="user-plus" class="h-4 w-4"></i>
                        Thêm nhân sự
                    </button>
                </template>

                <div class="flex items-center gap-2" x-show="!isCompanyRole">
                    <label for="companyFilter" class="text-sm text-slate-600 dark:text-slate-300">Công ty</label>
                    <select id="companyFilter" x-model="companyFilter" @change="onCompanyChange()"
                            class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-800">
                        <option value="">Tất cả</option>
                        <template x-for="c in companies" :key="c.id">
                            <option :value="c.id" x-text="c.name"></option>
                        </template>
                    </select>
                </div>

                <label for="roleFilter" class="text-sm text-slate-600 dark:text-slate-300"
                       x-show="!isCompanyRole">Lọc vai trò</label>
                <select id="roleFilter" x-model="roleFilter" @change="onFilterChange()"
                        x-show="!isCompanyRole"
                        class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-800">
                    <option value="">Tất cả</option>
                    <option value="ADMIN">ADMIN</option>
                    <option value="COMPANY">Doanh nghiệp</option>
                    <option value="HR">HR</option>
                    <option value="CANDIDATE">Ứng viên</option>
                </select>

                <template x-if="isCompanyRole">
                    <select x-model="roleFilter" @change="onFilterChange()"
                            class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-800">
                        <option value="">Tất cả</option>
                        <option value="HR">HR</option>
                        <option value="COMPANY">Doanh nghiệp</option>
                    </select>
                </template>

                <button type="button" @click="fetchUsers()"
                        class="inline-flex items-center gap-2 rounded-lg border border-slate-300 px-4 py-2 text-sm text-[#2563eb] transition hover:bg-slate-50 dark:border-slate-700 dark:hover:bg-slate-800">
                    <i data-lucide="refresh-cw" class="h-4 w-4"></i>
                    Làm mới
                </button>
            </div>
        </div>

        <div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <div x-show="loading" class="px-6 py-4 text-sm text-slate-500 dark:text-slate-400">Đang tải danh sách người dùng...</div>

            <div class="w-full overflow-x-auto" x-show="!loading">
                <table class="w-full table-auto divide-y divide-slate-200 dark:divide-slate-800">
                    <thead class="bg-slate-50 dark:bg-slate-800/60">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Họ tên</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Email</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Công ty</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Vai trò</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Phòng ban</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Trạng thái</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Tạo lúc</th>
                        <th class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Hành động</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
                    <template x-for="userItem in users" :key="userItem.id">
                        <tr class="transition hover:bg-slate-50/70 dark:hover:bg-slate-800/50">
                            <td class="px-4 py-3">
                                <p class="font-medium text-slate-800 dark:text-slate-100" x-text="userItem.fullName || 'Không có'"></p>
                            </td>
                            <td class="px-4 py-3 text-sm text-slate-700 dark:text-slate-300" x-text="userItem.email"></td>
                            <td class="px-4 py-3 text-sm text-slate-600 dark:text-slate-300" x-text="userItem.companyName || '-'"></td>
                            <td class="px-4 py-3">
                                <template x-if="isSelf(userItem) || isCompanyRole">
                                    <span class="inline-flex items-center rounded-full bg-blue-100 px-2.5 py-1 text-xs font-medium text-blue-700 dark:bg-blue-900/40 dark:text-blue-300"
                                          x-text="displayRole(userItem.role)"></span>
                                </template>
                                <template x-if="!isSelf(userItem) && !isCompanyRole">
                                    <select :value="userItem.role" @change="updateRole(userItem, $event.target.value)"
                                            class="rounded border border-slate-300 px-2 py-1 text-xs dark:border-slate-700 dark:bg-slate-800">
                                        <option value="ADMIN">Quản trị viên</option>
                                        <option value="COMPANY">Doanh nghiệp</option>
                                        <option value="HR">Nhân sự</option>
                                        <option value="CANDIDATE">Ứng viên</option>
                                    </select>
                                </template>
                            </td>
                            <td class="px-4 py-3">
                                <div class="group flex items-center gap-1">
                                    <span class="text-sm text-slate-600 dark:text-slate-300" x-text="userItem.department || '-'"></span>
                                    <button type="button"
                                            x-show="userItem.role === 'HR' && (isCompanyRole || !isCompanyRole)"
                                            @click="editDepartment(userItem)"
                                            class="opacity-0 transition group-hover:opacity-100" title="Chỉnh sửa phòng ban">
                                        <i data-lucide="pencil" class="h-3.5 w-3.5 text-[#2563eb]"></i>
                                    </button>
                                </div>
                            </td>
                            <td class="px-4 py-3">
                                <span class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-medium"
                                      :class="userItem.active ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300' : 'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300'"
                                      x-text="userItem.active ? 'Đang hoạt động' : 'Đã khóa'"></span>
                            </td>
                            <td class="px-4 py-3 text-sm text-slate-600 dark:text-slate-400" x-text="formatDate(userItem.createdAt)"></td>
                            <td class="px-4 py-3">
                                <div class="flex justify-end gap-2">
                                    <button type="button" @click="toggleLock(userItem)"
                                            :disabled="isSelf(userItem)"
                                            :title="userItem.active ? 'Khóa tài khoản' : 'Mở khóa'"
                                            class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-300 text-slate-600 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-600 dark:hover:bg-slate-800">
                                        <i data-lucide="lock" class="h-4 w-4" x-show="userItem.active"></i>
                                        <i data-lucide="unlock" class="h-4 w-4" x-show="!userItem.active"></i>
                                    </button>
                                    <button type="button" @click="deleteUser(userItem)"
                                            :disabled="isSelf(userItem)"
                                            title="Xóa tài khoản"
                                            class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-red-200 bg-red-50 text-red-600 transition hover:bg-red-100 disabled:cursor-not-allowed disabled:opacity-50 dark:border-red-900 dark:bg-red-950/40 dark:text-red-400 dark:hover:bg-red-950/60">
                                        <i data-lucide="trash-2" class="h-4 w-4"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                    </tbody>
                </table>
            </div>

            <div x-show="!loading &amp;&amp; users.length === 0" class="px-6 py-10 text-center text-slate-500 dark:text-slate-400">
                Không tìm thấy tài khoản nào với bộ lọc hiện tại.
            </div>

            <div class="flex items-center justify-between border-t border-slate-200 px-6 py-4 dark:border-slate-800">
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Tổng: <span class="font-semibold text-slate-800 dark:text-slate-200" x-text="totalElements"></span> tài khoản
                </p>
                <div class="flex items-center gap-2">
                    <button type="button" @click="prevPage()" :disabled="page <= 0"
                            class="rounded border border-slate-300 px-3 py-1.5 text-sm disabled:cursor-not-allowed disabled:opacity-50 hover:bg-slate-50 dark:border-slate-600 dark:hover:bg-slate-800">
                        Trước
                    </button>
                    <span class="text-sm text-slate-600 dark:text-slate-300">
                        Trang <span x-text="page + 1"></span>/<span x-text="Math.max(totalPages, 1)"></span>
                    </span>
                    <button type="button" @click="nextPage()" :disabled="page + 1 >= totalPages"
                            class="rounded border border-slate-300 px-3 py-1.5 text-sm disabled:cursor-not-allowed disabled:opacity-50 hover:bg-slate-50 dark:border-slate-600 dark:hover:bg-slate-800">
                        Sau
                    </button>
                </div>
            </div>
        </div>

        <!-- Modal Thêm nhân sự HR -->
        <div x-show="showAddHrModal" x-cloak
             class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm"
             @click.self="showAddHrModal = false">
            <div class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-2xl dark:bg-slate-900"
                 @click.stop>
                <div class="mb-5 flex items-center justify-between">
                    <h2 class="text-lg font-bold text-slate-900 dark:text-white">
                        <i data-lucide="user-plus" class="mr-2 inline h-5 w-5 text-[#2563eb]"></i>
                        Thêm nhân sự mới
                    </h2>
                    <button @click="showAddHrModal = false" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                        <i data-lucide="x" class="h-5 w-5"></i>
                    </button>
                </div>

                <form @submit.prevent="submitAddHr()">
                    <div class="space-y-4">
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">Họ và tên</label>
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400"></i>
                                <input type="text" x-model="hrForm.fullName" required
                                       class="w-full rounded-lg border border-slate-300 bg-white py-2.5 pl-10 pr-3 text-sm focus:border-[#2563eb] focus:ring-2 focus:ring-[#2563eb]/30 dark:border-slate-700 dark:bg-slate-800 dark:text-white"
                                       placeholder="Nguyễn Văn A">
                            </div>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
                            <div class="relative">
                                <i data-lucide="mail" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400"></i>
                                <input type="email" x-model="hrForm.email" required
                                       class="w-full rounded-lg border border-slate-300 bg-white py-2.5 pl-10 pr-3 text-sm focus:border-[#2563eb] focus:ring-2 focus:ring-[#2563eb]/30 dark:border-slate-700 dark:bg-slate-800 dark:text-white"
                                       placeholder="hr@company.com">
                            </div>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">Mật khẩu</label>
                            <div class="relative">
                                <i data-lucide="lock" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400"></i>
                                <input type="password" x-model="hrForm.password" required minlength="6"
                                       class="w-full rounded-lg border border-slate-300 bg-white py-2.5 pl-10 pr-3 text-sm focus:border-[#2563eb] focus:ring-2 focus:ring-[#2563eb]/30 dark:border-slate-700 dark:bg-slate-800 dark:text-white"
                                       placeholder="Tối thiểu 6 ký tự">
                            </div>
                        </div>
                        <div>
                            <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">
                                <i data-lucide="building" class="mr-1 inline h-4 w-4 text-slate-400"></i>
                                Phòng ban
                            </label>
                            <div class="flex gap-2">
                                <select x-model="hrForm.departmentId"
                                        class="flex-1 rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm focus:border-[#2563eb] focus:ring-2 focus:ring-[#2563eb]/30 dark:border-slate-700 dark:bg-slate-800 dark:text-white">
                                    <option value="">-- Không chọn --</option>
                                    <template x-for="dept in departments" :key="dept.id">
                                        <option :value="dept.id" x-text="dept.name"></option>
                                    </template>
                                </select>
                                <button type="button" @click="addNewDepartment()"
                                        class="inline-flex items-center gap-1 rounded-lg border border-dashed border-[#2563eb] px-3 py-2 text-xs font-medium text-[#2563eb] transition hover:bg-blue-50 dark:hover:bg-blue-950/30"
                                        title="Tạo phòng ban mới">
                                    <i data-lucide="plus" class="h-3.5 w-3.5"></i>
                                    Mới
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="mt-6 flex justify-end gap-3">
                        <button type="button" @click="showAddHrModal = false"
                                class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-800">
                            Hủy
                        </button>
                        <button type="submit" :disabled="hrFormSubmitting"
                                class="inline-flex items-center gap-2 rounded-lg bg-[#2563eb] px-5 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-[#1d4ed8] disabled:opacity-50">
                            <i data-lucide="check" class="h-4 w-4" x-show="!hrFormSubmitting"></i>
                            <svg x-show="hrFormSubmitting" class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none">
                                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"></circle>
                                <path fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" class="opacity-75"></path>
                            </svg>
                            Tạo tài khoản
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function adminUsersPage() {
            return {
                users: [],
                roleFilter: '',
                companyFilter: '',
                companies: [],
                page: 0,
                size: 10,
                totalPages: 0,
                totalElements: 0,
                loading: false,
                currentUserId: null,
                currentUserRole: null,
                currentUserCompanyId: null,
                isCompanyRole: false,

                showAddHrModal: false,
                departments: [],
                hrForm: { fullName: '', email: '', password: '', departmentId: '' },
                hrFormSubmitting: false,

                refreshLucide() {
                    this.$nextTick(() => {
                        if (typeof lucide !== 'undefined') lucide.createIcons();
                    });
                },

                syncGlobalStateUser() {
                    window.dispatchEvent(new CustomEvent('vthr:local-user-updated'));
                },

                async init() {
                    const currentUser = JSON.parse(localStorage.getItem('user') || 'null');

                    if (!currentUser || !['ADMIN', 'COMPANY'].includes(currentUser.role)) {
                        window.location.href = '/login?expired=true&reason=forbidden';
                        return;
                    }

                    this.currentUserId = currentUser?.id || null;
                    this.currentUserRole = currentUser?.role || null;
                    this.currentUserCompanyId = currentUser?.companyId || null;
                    this.isCompanyRole = currentUser?.role === 'COMPANY';

                    // Nếu localStorage.user thiếu companyId (hay xảy ra khi dữ liệu user cũ),
                    // refresh lại từ backend để tránh gọi /api/companies/null/...
                    if (this.isCompanyRole && !this.currentUserCompanyId && this.currentUserId) {
                        try {
                            const me = await api.get(`/api/admin/users/${this.currentUserId}`);
                            if (me?.success && me?.data) {
                                const updated = { ...(currentUser || {}), ...(me.data || {}) };
                                localStorage.setItem('user', JSON.stringify(updated));
                                this.currentUserCompanyId = updated.companyId || null;
                            }
                        } catch (e) {
                            // ignore
                        }
                    }

                    await this.fetchUsers();

                    if (this.isCompanyRole && this.currentUserCompanyId) {
                        await this.fetchDepartments();
                    }

                    if (!this.isCompanyRole) {
                        await this.fetchCompanies();
                    }

                    this.refreshLucide();
                },

                async fetchCompanies() {
                    try {
                        const res = await api.get('/api/admin/companies');
                        if (res.success) {
                            this.companies = res.data || [];
                        }
                    } catch (e) {
                        // ignore
                    }
                },

                async fetchDepartments() {
                    if (!this.currentUserCompanyId) return;
                    try {
                        const res = await api.get(`/api/companies/${this.currentUserCompanyId}/departments`);
                        if (res.success) {
                            this.departments = res.data || [];
                        }
                    } catch (e) {
                        console.error('Failed to fetch departments', e);
                    }
                },

                async fetchUsers() {
                    this.loading = true;
                    try {
                        const params = new URLSearchParams({
                            page: this.page,
                            size: this.size,
                            sort: 'createdAt,desc'
                        });
                        if (this.roleFilter) {
                            params.append('role', this.roleFilter);
                        }
                        if (!this.isCompanyRole && this.companyFilter) {
                            params.append('companyId', this.companyFilter);
                        }

                        const res = await api.get(`/api/admin/users?${params.toString()}`);
                        if (!res.success) {
                            api.showError('Lỗi', res.message || 'Không thể tải danh sách người dùng');
                            return;
                        }

                        const payload = res.data || {};
                        this.users = payload.content || [];
                        this.totalPages = payload.totalPages || 0;
                        this.totalElements = payload.totalElements || 0;
                        this.page = payload.number || 0;
                    } catch (e) {
                        api.showError('Lỗi', e?.data?.message || 'Không thể tải danh sách người dùng');
                    } finally {
                        this.loading = false;
                        this.refreshLucide();
                    }
                },

                onFilterChange() {
                    this.page = 0;
                    this.fetchUsers();
                },

                onCompanyChange() {
                    this.page = 0;
                    this.fetchUsers();
                },

                prevPage() {
                    if (this.page <= 0) return;
                    this.page -= 1;
                    this.fetchUsers();
                },

                nextPage() {
                    if (this.page + 1 >= this.totalPages) return;
                    this.page += 1;
                    this.fetchUsers();
                },

                isSelf(userItem) {
                    return !!this.currentUserId && userItem.id === this.currentUserId;
                },

                displayRole(role) {
                    if (role === 'ADMIN') return 'Quản trị viên';
                    if (role === 'SUPER_ADMIN') return 'Quản trị viên';
                    if (role === 'COMPANY') return 'Doanh nghiệp';
                    if (role === 'HR_MANAGER') return 'Doanh nghiệp';
                    if (role === 'HR') return 'Nhân sự';
                    if (role === 'CANDIDATE') return 'Ứng viên';
                    return role;
                },

                async updateRole(userItem, role) {
                    if (userItem.role === role) return;
                    try {
                        const res = await api.patch(`/api/admin/users/${userItem.id}/role`, { role });
                        if (res.success) {
                            userItem.role = role;
                            if (this.isSelf(userItem)) {
                                const u = JSON.parse(localStorage.getItem('user') || '{}');
                                u.role = role;
                                localStorage.setItem('user', JSON.stringify(u));
                                this.syncGlobalStateUser();
                            }
                            Swal.fire({ icon: 'success', title: 'Đã cập nhật vai trò', timer: 1200, showConfirmButton: false });
                        }
                    } catch (e) {
                        api.showError('Cập nhật vai trò thất bại', e?.data?.message || 'Vui lòng thử lại');
                        await this.fetchUsers();
                    }
                },

                async editDepartment(userItem) {
                    if (this.isCompanyRole && this.departments.length > 0) {
                        const deptOptions = {};
                        this.departments.forEach(d => { deptOptions[d.name] = d.name; });
                        deptOptions[''] = '-- Không chọn --';

                        const { value: newDepartment } = await Swal.fire({
                            title: 'Chọn phòng ban',
                            input: 'select',
                            inputOptions: deptOptions,
                            inputValue: userItem.department || '',
                            showCancelButton: true,
                            cancelButtonText: 'Hủy'
                        });

                        if (newDepartment !== undefined && newDepartment !== userItem.department) {
                            await this.saveDepartment(userItem, newDepartment);
                        }
                    } else {
                        const { value: newDepartment } = await Swal.fire({
                            title: 'Chỉnh sửa phòng ban',
                            input: 'text',
                            inputLabel: 'Tên phòng ban',
                            inputValue: userItem.department || '',
                            showCancelButton: true,
                            inputValidator: (value) => {
                                if (value && value.length > 255) {
                                    return 'Tên phòng ban quá dài!';
                                }
                            }
                        });

                        if (newDepartment !== undefined && newDepartment !== userItem.department) {
                            await this.saveDepartment(userItem, newDepartment);
                        }
                    }
                },

                async saveDepartment(userItem, newDepartment) {
                    try {
                        const res = await api.patch(`/api/admin/users/${userItem.id}/department`, { department: newDepartment });
                        if (res.success) {
                            userItem.department = newDepartment;
                            if (this.isSelf(userItem)) {
                                const u = JSON.parse(localStorage.getItem('user') || '{}');
                                u.department = newDepartment;
                                localStorage.setItem('user', JSON.stringify(u));
                                this.syncGlobalStateUser();
                            }
                            Swal.fire({ icon: 'success', title: 'Đã cập nhật phòng ban', timer: 1200, showConfirmButton: false });
                        }
                    } catch (e) {
                        api.showError('Cập nhật thất bại', e?.data?.message || 'Vui lòng thử lại');
                    }
                },

                async toggleLock(userItem) {
                    const endpoint = userItem.active
                        ? `/api/admin/users/${userItem.id}/lock`
                        : `/api/admin/users/${userItem.id}/unlock`;
                    try {
                        const res = await api.patch(endpoint, {});
                        if (res.success) {
                            userItem.active = !userItem.active;
                            if (this.isSelf(userItem)) {
                                const u = JSON.parse(localStorage.getItem('user') || '{}');
                                u.active = userItem.active;
                                localStorage.setItem('user', JSON.stringify(u));
                                this.syncGlobalStateUser();
                            }
                            Swal.fire({ icon: 'success', title: 'Đã cập nhật trạng thái', timer: 1200, showConfirmButton: false });
                        }
                    } catch (e) {
                        api.showError('Cập nhật trạng thái thất bại', e?.data?.message || 'Vui lòng thử lại');
                    }
                },

                async deleteUser(userItem) {
                    const confirmed = await Swal.fire({
                        title: 'Xác nhận xóa tài khoản?',
                        text: `Tài khoản ${userItem.email} sẽ bị xóa vĩnh viễn.`,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonText: 'Xóa',
                        cancelButtonText: 'Hủy'
                    });

                    if (!confirmed.isConfirmed) return;

                    try {
                        await api.delete(`/api/admin/users/${userItem.id}`);
                        Swal.fire({ icon: 'success', title: 'Đã xóa tài khoản', timer: 1200, showConfirmButton: false });
                        await this.fetchUsers();
                    } catch (e) {
                        api.showError('Xóa thất bại', e?.data?.message || 'Vui lòng thử lại');
                    }
                },

                openAddHrModal() {
                    this.hrForm = { fullName: '', email: '', password: '', departmentId: '' };
                    this.showAddHrModal = true;
                    this.refreshLucide();
                },

                async addNewDepartment() {
                    const { value: deptName } = await Swal.fire({
                        title: 'Tạo phòng ban mới',
                        input: 'text',
                        inputLabel: 'Tên phòng ban',
                        inputPlaceholder: 'VD: Phòng Kinh doanh',
                        showCancelButton: true,
                        inputValidator: (value) => {
                            if (!value || !value.trim()) return 'Tên phòng ban không được để trống!';
                            if (value.length > 255) return 'Tên quá dài!';
                        }
                    });

                    if (!deptName) return;

                    try {
                        const res = await api.post(`/api/companies/${this.currentUserCompanyId}/departments`, { name: deptName.trim() });
                        if (res.success) {
                            await this.fetchDepartments();
                            this.hrForm.departmentId = res.data.id;
                            Swal.fire({ icon: 'success', title: 'Đã tạo phòng ban', timer: 1200, showConfirmButton: false });
                            this.refreshLucide();
                        }
                    } catch (e) {
                        api.showError('Tạo phòng ban thất bại', e?.data?.message || 'Vui lòng thử lại');
                    }
                },

                async submitAddHr() {
                    if (!this.hrForm.fullName || !this.hrForm.email || !this.hrForm.password) {
                        api.showError('Thiếu thông tin', 'Vui lòng điền đầy đủ họ tên, email, mật khẩu.');
                        return;
                    }

                    this.hrFormSubmitting = true;
                    try {
                        const payload = {
                            fullName: this.hrForm.fullName,
                            email: this.hrForm.email,
                            password: this.hrForm.password,
                            departmentId: this.hrForm.departmentId || null
                        };

                        const res = await api.post(`/api/companies/${this.currentUserCompanyId}/hr-accounts`, payload);
                        if (res.success) {
                            this.showAddHrModal = false;
                            Swal.fire({ icon: 'success', title: 'Đã tạo tài khoản HR', text: `Tài khoản ${this.hrForm.email} đã được tạo thành công.`, timer: 2000, showConfirmButton: false });
                            await this.fetchUsers();
                        }
                    } catch (e) {
                        api.showError('Tạo tài khoản thất bại', e?.data?.message || 'Vui lòng thử lại');
                    } finally {
                        this.hrFormSubmitting = false;
                    }
                },

                formatDate(value) {
                    if (!value) return '-';
                    const d = new Date(value);
                    if (Number.isNaN(d.getTime())) return '-';
                    return d.toLocaleString('vi-VN');
                }
            }
        }
    </script>
</th:block>
</body>
</html>
