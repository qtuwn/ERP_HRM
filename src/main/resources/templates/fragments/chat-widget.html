<div th:fragment="chatWidget">
    <!-- Chat Widget Slide-over Panel -->
    <div x-data="chatWidgetConfig()"
         @open-chat.window="openChat($event.detail)"
         x-show="isOpen" 
         class="fixed inset-0 overflow-hidden z-[100]" 
         style="display: none;"
         aria-labelledby="slide-over-title" role="dialog" aria-modal="true">
         
        <div class="absolute inset-0 overflow-hidden">
            <!-- Background overlay -->
            <div x-show="isOpen" 
                 x-transition:enter="ease-in-out duration-500" 
                 x-transition:enter-start="opacity-0" 
                 x-transition:enter-end="opacity-100" 
                 x-transition:leave="ease-in-out duration-500" 
                 x-transition:leave-start="opacity-100" 
                 x-transition:leave-end="opacity-0" 
                 class="absolute inset-0 bg-gray-500 bg-opacity-75 transition-opacity" 
                 @click="closeChat()" aria-hidden="true"></div>

            <div class="fixed inset-y-0 right-0 pl-10 max-w-full flex">
                <!-- Slide-over panel -->
                <div x-show="isOpen" 
                     x-transition:enter="transform transition ease-in-out duration-500 sm:duration-700" 
                     x-transition:enter-start="translate-x-full" 
                     x-transition:enter-end="translate-x-0" 
                     x-transition:leave="transform transition ease-in-out duration-500 sm:duration-700" 
                     x-transition:leave-start="translate-x-0" 
                     x-transition:leave-end="translate-x-full" 
                     class="w-screen max-w-md">
                     
                    <div class="h-full flex flex-col bg-white shadow-xl">
                        <!-- Header -->
                        <div class="px-4 py-6 bg-primary text-white sm:px-6 flex justify-between items-center">
                            <div>
                                <h2 class="text-lg font-medium" id="slide-over-title">Chat</h2>
                                <p class="text-sm opacity-80" x-text="applicationTitle"></p>
                            </div>
                            <button @click="closeChat()" class="rounded-md text-white hover:text-gray-200 focus:outline-none">
                                <span class="sr-only">Close panel</span>
                                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                        
                        <!-- Messages List -->
                        <div class="flex-1 px-4 py-6 sm:px-6 overflow-y-auto bg-slate-50" id="chat-messages-container">
                            <ul class="space-y-4">
                                <template x-for="msg in messages" :key="msg.id">
                                    <li class="flex" :class="isMe(msg) ? 'justify-end' : 'justify-start'">
                                        <div class="max-w-[80%] rounded-lg px-4 py-2 shadow-sm"
                                             :class="isMe(msg) ? 'bg-primary text-white rounded-br-none' : 'bg-white border text-slate-800 rounded-bl-none'">
                                            <p class="text-xs font-semibold mb-1 opacity-75" x-text="isMe(msg) ? 'You' : msg.senderRole"></p>
                                            <p class="text-sm whitespace-pre-wrap" x-text="msg.content"></p>
                                            <p class="text-[10px] mt-1 text-right opacity-60" x-text="formatDate(msg.createdAt)"></p>
                                        </div>
                                    </li>
                                </template>
                            </ul>

                            <!-- Typing Indicator -->
                            <div x-show="typingUser" class="mt-4 flex justify-start">
                                <div class="bg-gray-200 rounded-full px-4 py-2 text-xs text-gray-500 animate-pulse">
                                    <span x-text="typingUser"></span> is typing...
                                </div>
                            </div>
                        </div>
                        
                        <!-- Input Box -->
                        <div class="border-t border-gray-200 p-4 bg-white">
                            <form @submit.prevent="sendMessage" class="flex gap-2">
                                <input type="text" 
                                       x-model="newMessage" 
                                       @input="onTyping()"
                                       placeholder="Type a message..." 
                                       class="flex-1 w-full rounded-md border-gray-300 border px-3 py-2 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"
                                       required>
                                <button type="submit" 
                                        :disabled="isSending || !newMessage.trim()"
                                        class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-blue-700 disabled:opacity-50">
                                    Send
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alpine Widget Logic -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('chatWidgetConfig', () => ({
                isOpen: false,
                applicationId: null,
                applicationTitle: '',
                messages: [],
                newMessage: '',
                isSending: false,
                typingUser: null,
                typingTimeout: null,
                stompClient: null,
                currentUserId: null,

                async openChat(detail) {
                    this.applicationId = detail.applicationId;
                    this.applicationTitle = detail.applicationTitle || 'ApplicationChat';
                    this.isOpen = true;
                    this.messages = [];
                    
                    const userStr = localStorage.getItem('user');
                    if(userStr) {
                        this.currentUserId = JSON.parse(userStr).id;
                    }

                    await this.fetchHistory();
                    this.connectStomp();
                },

                closeChat() {
                    this.isOpen = false;
                    if(this.stompClient && this.stompClient.connected) {
                        this.stompClient.disconnect();
                    }
                },

                async fetchHistory() {
                    try {
                        const res = await api.get(`/api/applications/${this.applicationId}/messages`);
                        if(res.success) {
                            this.messages = res.data.content; // It's a Page
                            this.scrollToBottom();
                        }
                    } catch(e) {
                        console.error("Fetch history failed", e);
                    }
                },

                connectStomp() {
                    const token = localStorage.getItem('accessToken');
                    if(!token) return;

                    const socket = new SockJS('/ws/hrm');
                    this.stompClient = Stomp.over(socket);
                    this.stompClient.debug = null; // Disable excessive console logs

                    this.stompClient.connect({'Authorization': 'Bearer ' + token}, (frame) => {
                        console.log('STOMP Connected: ' + frame);
                        
                        this.stompClient.subscribe(`/topic/applications/${this.applicationId}`, (message) => {
                            const event = JSON.parse(message.body);
                            if(event.type === 'chat:new_message') {
                                this.messages.push(event.payload);
                                // Clear typing indicator if sender typed
                                if(this.typingUser && event.payload.senderRole === this.typingUser) {
                                    this.typingUser = null;
                                }
                                this.scrollToBottom();
                            } else if (event.type === 'chat:typing') {
                                // Ignore self type
                                if(event.payload.senderId !== this.currentUserId) {
                                    this.typingUser = event.payload.senderRole;
                                    clearTimeout(this.typingTimeout);
                                    this.typingTimeout = setTimeout(() => {
                                        this.typingUser = null;
                                    }, 2500);
                                    this.scrollToBottom();
                                }
                            }
                        });
                    }, (error) => {
                        console.error('STOMP error:', error);
                    });
                },

                async sendMessage() {
                    if(!this.newMessage.trim()) return;
                    this.isSending = true;
                    try {
                        await api.fetchWithToken(`/api/applications/${this.applicationId}/messages`, {
                            method: 'POST',
                            body: JSON.stringify({ content: this.newMessage })
                        });
                        this.newMessage = '';
                    } catch (e) {
                        api.showError("Failed to send message", e.message);
                    } finally {
                        this.isSending = false;
                    }
                },

                onTyping() {
                    // Throttle typing API to avoid spamming
                    if(this.isTypingLocked) return;
                    this.isTypingLocked = true;
                    setTimeout(() => this.isTypingLocked = false, 1500);

                    api.fetchWithToken(`/api/applications/${this.applicationId}/messages/typing`, { method: 'POST' }).catch(e => {});
                },

                isMe(msg) {
                    return msg.senderId === this.currentUserId;
                },

                formatDate(iso) {
                    const d = new Date(iso);
                    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                },

                scrollToBottom() {
                    this.$nextTick(() => {
                        const container = document.getElementById('chat-messages-container');
                        if (container) {
                            container.scrollTop = container.scrollHeight;
                        }
                    });
                }
            }));
        });
    </script>
</div>
