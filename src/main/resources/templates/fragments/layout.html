<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">VTHR Solutions</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#2563eb', secondary: '#475569' }
                }
            }
        }
    </script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Custom API Wrapper -->
    <script src="/js/api.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-800" x-data="globalState()">
    
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="/" class="flex-shrink-0 flex items-center gap-2">
                        <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-white font-bold text-xl">V</div>
                        <span class="font-bold text-xl tracking-tight text-slate-900">VTHR</span>
                    </a>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden sm:flex sm:items-center sm:space-x-8">
                    <a href="/jobs" class="text-slate-500 hover:text-slate-900 px-3 py-2 font-medium transition-colors">Việc làm</a>
                    
                    <template x-if="!user">
                        <div class="flex space-x-4 ml-4">
                            <a href="/login" class="text-slate-600 hover:text-slate-900 px-3 py-2 font-medium">Đăng nhập</a>
                            <a href="/register" class="bg-primary text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 transition-colors shadow-sm">Đăng ký</a>
                        </div>
                    </template>
                    
                    <template x-if="user">
                        <div class="relative" x-data="{ open: false }">
                            <button @click="open = !open" class="flex items-center gap-2 text-slate-700 hover:text-slate-900">
                                <span class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center font-bold text-primary" x-text="user.fullName.charAt(0)"></span>
                                <span class="font-medium" x-text="user.fullName"></span>
                                <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-1 border z-50" style="display: none;">
                                <a href="#" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Hồ sơ của tôi</a>
                                <button @click="logout()" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">Đăng xuất</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="w-full">
        <div th:replace="${content}"></div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-auto py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-slate-500 text-sm">
            <p>&copy; 2026 VTHR Solutions. All rights reserved.</p>
        </div>
    </footer>

    <script>
        function globalState() {
            return {
                user: JSON.parse(localStorage.getItem('user')) || null,
                init() {
                    const urlParams = new URLSearchParams(window.location.search);
                    if(urlParams.get('expired')) {
                        Swal.fire({ icon: 'warning', title: 'Phiên đăng nhập hết hạn!', text: 'Vui lòng đăng nhập lại.' });
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                },
                async logout() {
                    try {
                        await api.fetchWithToken('/auth/logout', { method: 'POST' });
                    } catch(e) {} // ignore fail
                    api.clearTokens();
                    this.user = null;
                    window.location.href = '/login';
                }
            }
        }
    </script>
</body>
</html>
