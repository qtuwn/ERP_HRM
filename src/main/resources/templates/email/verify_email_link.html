<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Xác thực email - VTHR</title>
</head>
<body style="margin:0;padding:0;background:#f6f9fc;font-family:Arial,Helvetica,sans-serif;color:#0f172a;">
<div style="max-width:640px;margin:0 auto;padding:24px;">
    <div style="background:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb;">
        <div style="padding:20px 24px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;">
            <div style="font-size:16px;font-weight:700;letter-spacing:.2px;">VTHR Solutions</div>
            <div style="margin-top:6px;font-size:13px;opacity:.95;">Xác thực email tài khoản</div>
        </div>

        <div style="padding:22px 24px;">
            <p style="margin:0 0 12px 0;font-size:14px;line-height:1.6;">
                Xin chào <span style="font-weight:600;" th:text="${fullName}">bạn</span>,
            </p>
            <p style="margin:0 0 14px 0;font-size:14px;line-height:1.6;">
                Vui lòng bấm nút bên dưới để xác thực email. Link có hiệu lực trong
                <span style="font-weight:700;" th:text="${hours}">24</span> giờ.
            </p>

            <div style="text-align:center;margin:18px 0 8px;">
                <a th:href="${verifyUrl}"
                   style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:10px;font-weight:700;font-size:14px;">
                    Xác thực email
                </a>
            </div>

            <p style="margin:12px 0 0 0;font-size:12px;line-height:1.6;color:#475569;">
                Nếu nút không hoạt động, hãy copy link sau vào trình duyệt:
                <br/>
                <span th:text="${verifyUrl}" style="word-break:break-all;color:#1d4ed8;">https://example.com</span>
            </p>
        </div>

        <div style="padding:16px 24px;border-top:1px solid #e5e7eb;background:#fafafa;">
            <div style="font-size:12px;color:#64748b;line-height:1.5;">
                © <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2026</span> VTHR Solutions. All rights reserved.
            </div>
        </div>
    </div>
</div>
</body>
</html>
