<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Đăng ký - VTHR', ~{::section})}">
<section class="max-w-md mx-auto mt-20 p-8 bg-white rounded-xl shadow-sm border" x-data="registerForm()">
    
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-900">Đăng ký tài khoản</h1>
        <p class="text-slate-500 mt-2">Dành cho ứng viên tìm việc</p>
    </div>

    <form @submit.prevent="submit" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Họ và tên</label>
            <input x-model="form.fullName" type="text" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input x-model="form.email" type="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu</label>
                <input x-model="form.password" type="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Điện thoại</label>
                <input x-model="form.phone" type="text" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">
            </div>
        </div>

        <button type="submit" :disabled="loading" class="w-full bg-primary text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 transition-colors shadow-sm disabled:opacity-50 flex justify-center items-center">
            <span x-show="!loading">Đăng ký</span>
            <svg x-show="loading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" style="display: none;"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>
    </form>
    
    <div class="mt-6 text-center text-sm text-slate-600">
        Đã có tài khoản? <a href="/login" class="text-primary font-medium hover:underline">Đăng nhập</a>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('registerForm', () => ({
                form: { email: '', password: '', fullName: '', phone: '' },
                loading: false,
                async submit() {
                    this.loading = true;
                    try {
                        const res = await api.fetchWithToken('/auth/register', {
                            method: 'POST',
                            body: JSON.stringify(this.form)
                        });
                        Swal.fire({ icon: 'success', title: 'Thành công', text: 'Đăng ký thành công! Vui lòng đăng nhập.'}).then(() => {
                            window.location.href = '/login';
                        });
                    } catch (err) {
                        Swal.fire({ icon: 'error', title: 'Lỗi', text: err.data?.message || 'Lỗi đăng ký' });
                    } finally {
                        this.loading = false;
                    }
                }
            }));
        });
    </script>
</section>
</html>
