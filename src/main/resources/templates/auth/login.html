<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Đăng nhập - VTHR', ~{::section})}">
<section class="max-w-md mx-auto mt-20 p-8 bg-white rounded-xl shadow-sm border" x-data="loginForm()">
    
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-900">Đăng nhập</h1>
        <p class="text-slate-500 mt-2">Đăng nhập để quản lý và ứng tuyển việc làm</p>
    </div>

    <form @submit.prevent="submit" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input x-model="form.email" type="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu</label>
            <input x-model="form.password" type="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">
            <div class="mt-2 text-right">
                <button type="button" @click="forgotPasswordFlow" class="text-sm text-primary hover:underline">Quên mật khẩu?</button>
            </div>
        </div>

        <button type="submit" :disabled="loading" class="w-full bg-primary text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 transition-colors shadow-sm disabled:opacity-50 flex justify-center items-center">
            <span x-show="!loading">Đăng nhập</span>
            <svg x-show="loading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" style="display: none;"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>
    </form>
    
    <div class="mt-6 text-center text-sm text-slate-600">
        Chưa có tài khoản? <a href="/register" class="text-primary font-medium hover:underline">Đăng ký ngay</a>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('loginForm', () => ({
                form: { email: '', password: '' },
                loading: false,
                async submit() {
                    this.loading = true;
                    try {
                        const res = await api.fetchWithToken('/auth/login', {
                            method: 'POST',
                            body: JSON.stringify(this.form)
                        });
                        api.setTokens(res.data.accessToken, res.data.refreshToken);
                        localStorage.setItem('user', JSON.stringify(res.data.user));
                        
                        Swal.fire({ icon: 'success', title: 'Thành công', text: 'Đăng nhập thành công!', timer: 1500, showConfirmButton: false }).then(() => {
                            const userRole = res.data.user.role;
                            if (userRole === 'ADMIN' || userRole === 'HR') {
                                window.location.href = '/dashboard';
                            } else {
                                window.location.href = '/jobs';
                            }
                        });
                    } catch (err) {
                        Swal.fire({ icon: 'error', title: 'Lỗi', text: err.data?.message || 'Sai thông tin đăng nhập' });
                    } finally {
                        this.loading = false;
                    }
                },
                async forgotPasswordFlow() {
                    const emailStep = await Swal.fire({
                        title: 'Quên mật khẩu',
                        input: 'email',
                        inputPlaceholder: 'Nhập email tài khoản',
                        confirmButtonText: 'Gửi OTP',
                        showCancelButton: true
                    });

                    if (!emailStep.value) return;

                    const email = emailStep.value;
                    try {
                        await api.fetchWithToken('/auth/forgot-password/request', {
                            method: 'POST',
                            body: JSON.stringify({ email })
                        });
                    } catch (err) {
                        Swal.fire({ icon: 'error', title: 'Lỗi', text: err.data?.message || 'Không gửi được OTP' });
                        return;
                    }

                    const otpStep = await Swal.fire({
                        title: 'Đặt lại mật khẩu',
                        html: `
                            <input id="otp" class="swal2-input" placeholder="Mã OTP">
                            <input id="newPassword" type="password" class="swal2-input" placeholder="Mật khẩu mới">
                        `,
                        focusConfirm: false,
                        showCancelButton: true,
                        confirmButtonText: 'Đặt lại mật khẩu',
                        preConfirm: () => {
                            const otp = document.getElementById('otp').value;
                            const newPassword = document.getElementById('newPassword').value;
                            if (!otp || !newPassword) {
                                Swal.showValidationMessage('Vui lòng nhập đủ OTP và mật khẩu mới');
                                return false;
                            }
                            return { otp, newPassword };
                        }
                    });

                    if (!otpStep.value) return;

                    try {
                        await api.fetchWithToken('/auth/forgot-password/confirm', {
                            method: 'POST',
                            body: JSON.stringify({
                                email,
                                otp: otpStep.value.otp,
                                newPassword: otpStep.value.newPassword
                            })
                        });
                        Swal.fire({ icon: 'success', title: 'Thành công', text: 'Mật khẩu đã được đặt lại.' });
                    } catch (err) {
                        Swal.fire({ icon: 'error', title: 'Lỗi', text: err.data?.message || 'OTP không hợp lệ hoặc đã hết hạn' });
                    }
                }
            }));
        });
    </script>
</section>
</html>
