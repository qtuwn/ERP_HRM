<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Ứng tuyển ngay - VTHR', ~{::section})}">
<section class="max-w-4xl mx-auto py-10" x-data="applyForm()">
    
    <div class="bg-white rounded-xl shadow-sm border p-8">
        
        <!-- Header / Progress Bar -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-slate-900 mb-6">Nộp hồ sơ ứng tuyển</h1>
            <div class="flex items-center justify-between relative">
                <div class="absolute left-0 top-1/2 transform -translate-y-1/2 w-full h-1 bg-slate-200 -z-10 rounded-full"></div>
                
                <template x-for="s in [1, 2, 3, 4]" :key="s">
                    <div class="flex flex-col items-center gap-2 bg-white px-2">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition-colors border-2" 
                            :class="step >= s ? 'bg-primary border-primary text-white' : 'bg-white border-slate-300 text-slate-400'">
                            <span x-text="s"></span>
                        </div>
                        <span class="text-xs font-medium" 
                            :class="step >= s ? 'text-primary' : 'text-slate-400'"
                            x-text="['Thông tin', 'CV', 'Ghi chú', 'Hoàn tất'][s-1]"></span>
                    </div>
                </template>
            </div>
        </div>

        <!-- Check auth -->
        <div x-show="!user" class="text-center py-10" style="display: none;">
            <p class="text-slate-600 mb-4">Bạn cần đăng nhập để ứng tuyển vị trí này.</p>
            <a href="/login" class="bg-primary text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700">Đăng nhập</a>
        </div>

        <div x-show="user">
            <!-- Step 1: Info -->
            <div x-show="step === 1" class="space-y-6">
                <h2 class="text-lg font-bold text-slate-900 border-b pb-2">1. Thông tin cá nhân</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Họ và tên</label>
                        <input type="text" disabled :value="user?.fullName" class="w-full px-4 py-2 border rounded-lg bg-slate-50 text-slate-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                        <input type="email" disabled :value="user?.email" class="w-full px-4 py-2 border rounded-lg bg-slate-50 text-slate-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Số điện thoại</label>
                        <input type="text" disabled :value="user?.phone" class="w-full px-4 py-2 border rounded-lg bg-slate-50 text-slate-500">
                    </div>
                </div>
                <p class="text-sm text-slate-500 italic">* Thông tin được lấy từ hồ sơ hiện tại của bạn.</p>
            </div>

            <!-- Step 2: Upload CV -->
            <div x-show="step === 2" class="space-y-6" style="display: none;">
                <h2 class="text-lg font-bold text-slate-900 border-b pb-2">2. Upload CV / Resume</h2>
                
                <div class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center" 
                     :class="dragOver ? 'border-primary bg-blue-50' : 'hover:bg-slate-50'"
                     @dragover.prevent="dragOver = true" @dragleave.prevent="dragOver = false" @drop.prevent="handleDrop($event)">
                    
                    <svg class="mx-auto h-12 w-12 text-slate-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 48 48"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" /></svg>
                    
                    <template x-if="!file">
                        <div>
                            <p class="text-slate-600 mb-2">Kéo thả file CV vào đây hoặc</p>
                            <label class="cursor-pointer bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg font-medium hover:bg-slate-50 shadow-sm inline-block">
                                Chọn File
                                <input type="file" class="hidden" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" @change="handleFileSelect">
                            </label>
                            <p class="text-xs text-slate-500 mt-4">Chỉ chấp nhận file PDF hoặc DOCX (Max 5MB).</p>
                        </div>
                    </template>

                    <template x-if="file">
                        <div class="flex items-center justify-between bg-white border p-4 rounded-lg shadow-sm text-left max-w-sm mx-auto">
                            <div class="flex items-center gap-3 overflow-hidden">
                                <svg class="w-8 h-8 text-red-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"></path></svg>
                                <div class="truncate">
                                    <p class="text-sm font-medium text-slate-900 truncate" x-text="file.name"></p>
                                    <p class="text-xs text-slate-500" x-text="(file.size / 1024 / 1024).toFixed(2) + ' MB'"></p>
                                </div>
                            </div>
                            <button @click="file = null" class="text-slate-400 hover:text-red-500 p-1">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Step 3: Note -->
            <div x-show="step === 3" class="space-y-6" style="display: none;">
                <h2 class="text-lg font-bold text-slate-900 border-b pb-2">3. Lời nhắn (Tùy chọn)</h2>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Ghi chú cho bộ phận tuyển dụng (Cover Letter)</label>
                    <textarea x-model="note" rows="5" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-slate-700 resize-none" placeholder="Viết giới thiệu ngắn về bản thân..."></textarea>
                </div>
            </div>

            <!-- Step 4: Submission -->
            <div x-show="step === 4" class="space-y-6 text-center py-10" style="display: none;">
                <svg x-show="loading" class="animate-spin h-12 w-12 text-primary mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <div x-show="!loading">
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Sẵn sàng nộp hồ sơ!</h2>
                    <p class="text-slate-500 mb-6">Bạn đang nộp CV <b><span x-text="file?.name"></span></b>.</p>
                    <button @click="submitApplication" class="bg-primary text-white font-medium px-8 py-3 rounded-lg shadow-lg hover:bg-blue-700 hover:-translate-y-0.5 transition-all w-full sm:w-auto">Xác Nhận Nộp Hồ Sơ</button>
                </div>
            </div>

            <!-- Navigation Controls -->
            <div class="mt-10 flex justify-between border-t pt-6" x-show="step < 4">
                <button @click="prev" :disabled="step === 1" class="px-6 py-2.5 rounded-lg font-medium text-slate-600 hover:bg-slate-100 disabled:opacity-30 transition-colors">Quay lại</button>
                <button @click="next" class="bg-slate-900 text-white px-6 py-2.5 rounded-lg font-medium hover:bg-slate-800 transition-colors shadow-sm">Tiếp tục</button>
            </div>
        </div>

    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const targetJobId = window.location.pathname.split('/')[2];
        /*]]>*/

        document.addEventListener('alpine:init', () => {
            Alpine.data('applyForm', () => ({
                step: 1,
                jobId: targetJobId,
                file: null,
                note: '',
                dragOver: false,
                loading: false,

                handleDrop(e) {
                    this.dragOver = false;
                    if(e.dataTransfer.files && e.dataTransfer.files[0]) {
                        this.validateFile(e.dataTransfer.files[0]);
                    }
                },
                
                handleFileSelect(e) {
                    if(e.target.files && e.target.files[0]) {
                        this.validateFile(e.target.files[0]);
                    }
                },

                validateFile(f) {
                    const validTypes = ['application/pdf', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
                    if(!validTypes.includes(f.type) && !f.name.endsWith('.pdf') && !f.name.endsWith('.docx')) {
                        Swal.fire('Lỗi', 'Chỉ được tải lên PDF hoặc DOCX.', 'error');
                        return;
                    }
                    if(f.size > 5 * 1024 * 1024) {
                        Swal.fire('Lỗi', 'Dung lượng file vượt quá 5MB.', 'error');
                        return;
                    }
                    this.file = f;
                },

                next() {
                    if(this.step === 2 && !this.file) {
                        Swal.fire('Chưa chọn CV', 'Vui lòng upload CV của bạn.', 'warning');
                        return;
                    }
                    if(this.step < 4) this.step++;
                },
                
                prev() {
                    if(this.step > 1) this.step--;
                },

                async submitApplication() {
                    this.loading = true;
                    try {
                        const formData = new FormData();
                        formData.append('cv', this.file);
                        
                        const res = await api.fetchWithToken(`/jobs/${this.jobId}/applications`, {
                            method: 'POST',
                            body: formData
                        });
                        
                        Swal.fire({
                            icon: 'success', title: 'Hoàn tất!', text: 'Đã nộp hồ sơ thành công.',
                            confirmButtonText: 'Quản lý CV'
                        }).then(() => {
                            window.location.href = '/jobs';
                        });
                    } catch (e) {
                        Swal.fire('Thất bại', e.data?.message || 'Có lỗi xảy ra', 'error');
                        this.step = 2; // Return to upload step
                    } finally {
                        this.loading = false;
                    }
                }
            }));
        });
    </script>
</section>
</html>
