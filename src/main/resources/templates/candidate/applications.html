<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('My Applications', ~{::section})}">
<head>
    <title>My Applications</title>
</head>
<body>
<section>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-data="candidateApps()">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">My Applications</h1>
        
        <div class="bg-white shadow overflow-hidden sm:rounded-md">
            <ul role="list" class="divide-y divide-gray-200">
                <template x-for="app in applications" :key="app.id">
                    <li>
                        <div class="px-4 py-4 flex items-center sm:px-6 justify-between hover:bg-slate-50 transition border-l-4 border-transparent hover:border-primary">
                            <div class="flex flex-col">
                                <div class="flex items-center gap-3">
                                    <p class="text-sm font-semibold text-slate-800" x-text="app.jobTitle"></p>
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                                          :class="{
                                            'bg-yellow-100 text-yellow-800': app.status === 'APPLIED' || app.status === 'AI_SCREENING',
                                            'bg-blue-100 text-blue-800': app.status === 'HR_REVIEW' || app.status === 'INTERVIEW',
                                            'bg-green-100 text-green-800': app.status === 'OFFER' || app.status === 'HIRED',
                                            'bg-red-100 text-red-800': app.status === 'REJECTED'
                                          }"
                                          x-text="app.status.replace('_', ' ')">
                                    </span>
                                </div>
                                <p class="mt-1 text-xs text-slate-500" x-text="'Applied: ' + new Date(app.createdAt).toLocaleDateString()"></p>
                            </div>
                            <div class="ml-4 flex-shrink-0 flex gap-2">
                                <button @click.stop="viewDetail(app.id)"
                                        class="inline-flex items-center px-3 py-2 border border-gray-300 text-sm font-medium rounded-md shadow-sm bg-white hover:bg-gray-50 transition">
                                    Detail
                                </button>
                                <button @click.stop="$dispatch('open-chat', { applicationId: app.id, applicationTitle: 'Chat w/ HR: ' + app.jobTitle })"
                                        class="inline-flex items-center px-3 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-primary bg-blue-50 hover:bg-blue-100 transition">
                                    <svg class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                                    Open Chat
                                </button>
                            </div>
                        </div>
                    </li>
                </template>
            </ul>
        </div>
        
        </div>
        
        <!-- Application Detail Modal -->
        <div x-show="isDetailOpen" class="fixed inset-0 z-50 overflow-y-auto" style="display: none;" aria-labelledby="modal-title" role="dialog" aria-modal="true">
            <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                <div x-show="isDetailOpen" class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="isDetailOpen = false"></div>
                <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
                <div x-show="isDetailOpen" class="inline-block align-bottom bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full sm:p-6 w-full">
                    <div x-show="isDetailLoading" class="p-8 text-center text-gray-500 animate-pulse">Loading Application Details...</div>
                    <div x-show="!isDetailLoading &amp;&amp; detailData">
                        <div class="flex justify-between items-start mb-4 border-b pb-4">
                            <div>
                                <h3 class="text-lg leading-6 font-medium text-gray-900" x-text="detailData?.jobTitle"></h3>
                                <p class="text-sm text-gray-500" x-text="'Applied on: ' + new Date(detailData?.application?.createdAt).toLocaleDateString()"></p>
                            </div>
                            <button @click="isDetailOpen = false" class="text-gray-400 hover:text-gray-500">
                                <span class="sr-only">Close</span><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                            </button>
                        </div>
                        
                        <div class="space-y-6">
                            <!-- Basic details -->
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-gray-50 p-3 rounded">
                                    <span class="block text-xs font-semibold text-gray-500 uppercase">Current Stage</span>
                                    <span class="block mt-1 text-sm font-bold capitalize text-slate-800" x-text="detailData?.application?.status?.replace('_', ' ')"></span>
                                </div>
                                <div class="bg-gray-50 p-3 rounded">
                                    <span class="block text-xs font-semibold text-gray-500 uppercase">CV Reference</span>
                                    <a :href="detailData?.application?.cvUrl" target="_blank" class="block mt-1 text-sm font-medium text-blue-600 hover:underline">Download / View CV</a>
                                </div>
                            </div>
                            
                            <!-- AI Evaluation -->
                            <div x-show="detailData?.aiEvaluation" class="bg-blue-50/50 border border-blue-100 rounded p-4">
                                <h4 class="text-sm font-semibold text-blue-800 mb-2">AI Screening Summary</h4>
                                <div class="text-sm text-slate-700 whitespace-pre-wrap" x-text="detailData?.aiEvaluation?.summary"></div>
                            </div>

                            <!-- Interview Schedule -->
                            <div x-show="detailData?.interviews &amp;&amp; detailData.interviews.length > 0">
                                <h4 class="text-md font-semibold text-slate-800 mb-2 border-b pb-2">Interview History</h4>
                                <ul class="space-y-3">
                                    <template x-for="interview in detailData?.interviews" :key="interview.id">
                                        <li class="bg-white border rounded p-3 flex justify-between items-center shadow-sm">
                                            <div>
                                                <p class="text-sm font-medium text-slate-800">Scheduled: <span x-text="new Date(interview.interviewTime).toLocaleString()"></span></p>
                                                <div class="mt-1 flex items-center text-xs text-slate-500">
                                                    <svg class="mr-1.5 h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                                                    <a :href="interview.locationOrLink" target="_blank" x-show="interview.locationOrLink.startsWith('http')" class="text-blue-500 hover:underline" x-text="'Join Meeting'"></a>
                                                    <span x-show="!interview.locationOrLink.startsWith('http')" x-text="interview.locationOrLink"></span>
                                                </div>
                                            </div>
                                            <span class="px-2 py-1 text-xs font-semibold rounded-full" 
                                                  :class="interview.status === 'SCHEDULED' ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-800'"
                                                  x-text="interview.status"></span>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                            <div x-show="!detailData?.interviews || detailData.interviews.length === 0" class="text-sm text-gray-500 italic p-4 text-center border-t">No interviews scheduled yet.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alpine.js logic -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('candidateApps', () => ({
                applications: [],
                isLoading: true,
                isDetailOpen: false,
                isDetailLoading: false,
                detailData: null,
                
                async init() {
                    try {
                        const res = await api.fetchWithToken('/api/users/me/applications?size=50');
                        if (res.success) {
                            this.applications = res.data.content;
                        }
                    } catch (e) {
                        console.error("Failed to load apps", e);
                    } finally {
                        this.isLoading = false;
                    }
                },
                
                async viewDetail(appId) {
                    this.isDetailOpen = true;
                    this.isDetailLoading = true;
                    this.detailData = null;
                    try {
                        const res = await api.fetchWithToken('/api/users/me/applications/' + appId);
                        if (res.success) {
                            this.detailData = res.data;
                        } else {
                            api.showError("Network Error", res.message);
                        }
                    } catch(e) {
                         console.error(e);
                    } finally {
                        this.isDetailLoading = false;
                    }
                }
            }));
        });
    </script>
    
    <!-- Shared Chat Component -->
    <div th:replace="~{fragments/chat-widget :: chatWidget}"></div>
</section>
</body>
</html>
