<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('User Profile', ~{::section})}">
<head>
    <title>User Profile</title>
</head>
<body>
<section>
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8" x-data="userProfile()">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Hồ sơ của tôi</h1>
            <p class="text-gray-600 mt-2">Quản lý thông tin cá nhân và cài đặt tài khoản</p>
        </div>

        <!-- Profile Overview -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <div class="flex items-center space-x-4">
                <div class="w-20 h-20 rounded-full bg-indigo-500 flex items-center justify-center text-white text-2xl font-bold" 
                     x-text="user?.fullName?.charAt(0) || 'U'"></div>
                <div>
                    <h2 class="text-xl font-semibold text-gray-900" x-text="user?.fullName || 'Loading...'"></h2>
                    <p class="text-gray-600" x-text="user?.email || 'Loading...'"></p>
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800" 
                          x-text="user?.role || 'Loading...'"></span>
                </div>
            </div>
        </div>

        <!-- Profile Details -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-medium text-gray-900">Thông tin chi tiết</h3>
            </div>
            <div class="px-6 py-4">
                <dl class="grid grid-cols-1 gap-x-4 gap-y-6 sm:grid-cols-2">
                    <div>
                        <dt class="text-sm font-medium text-gray-500">Họ và tên</dt>
                        <dd class="mt-1 text-sm text-gray-900" x-text="user?.fullName || '...'"></dd>
                    </div>
                    <div>
                        <dt class="text-sm font-medium text-gray-500">Email</dt>
                        <dd class="mt-1 text-sm text-gray-900" x-text="user?.email || '...'"></dd>
                    </div>
                    <div>
                        <dt class="text-sm font-medium text-gray-500">Số điện thoại</dt>
                        <dd class="mt-1 text-sm text-gray-900" x-text="user?.phone || 'Chưa cập nhật'"></dd>
                    </div>
                    <div>
                        <dt class="text-sm font-medium text-gray-500">Phòng ban</dt>
                        <dd class="mt-1 text-sm text-gray-900" x-text="user?.department || 'Chưa cập nhật'"></dd>
                    </div>
                    <div>
                        <dt class="text-sm font-medium text-gray-500">Vai trò</dt>
                        <dd class="mt-1 text-sm text-gray-900" x-text="user?.role || '...'"></dd>
                    </div>
                    <div>
                        <dt class="text-sm font-medium text-gray-500">Trạng thái</dt>
                        <dd class="mt-1">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                                  :class="user?.isActive ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                                  x-text="user?.isActive ? 'Đang hoạt động' : 'Đã khóa'"></span>
                        </dd>
                    </div>
                </dl>
            </div>
        </div>

        <!-- Applications Section (for candidates) -->
        <div x-show="user?.role === 'CANDIDATE'" class="mt-6">
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-medium text-gray-900">Đơn ứng tuyển gần đây</h3>
                </div>
                <div class="px-6 py-4">
                    <div class="text-center text-gray-500 py-8">
                        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <p class="mt-2">Chưa có đơn ứng tuyển nào</p>
                        <a href="/jobs" class="mt-4 inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                            Xem việc làm
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function userProfile() {
            return {
                user: null,
                loading: true,

                async init() {
                    await this.loadUserProfile();
                },

                async loadUserProfile() {
                    try {
                        // Get user from localStorage (set during login)
                        this.user = JSON.parse(localStorage.getItem('user')) || null;
                    } catch (error) {
                        console.error('Failed to load user profile:', error);
                        api.showError('Lỗi', 'Không thể tải thông tin người dùng');
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</section>
</body>
</html>
