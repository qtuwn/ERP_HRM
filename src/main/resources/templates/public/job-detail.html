<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Chi tiết Việc làm - VTHR', ~{::section})}">
<section class="max-w-4xl mx-auto py-10" x-data="jobDetail()">
    
    <!-- Skeleton loader -->
    <div x-show="loading" class="animate-pulse flex flex-col gap-6">
        <div class="h-48 bg-slate-200 rounded-xl"></div>
        <div class="h-64 bg-slate-200 rounded-xl"></div>
    </div>

    <!-- Content -->
    <div x-show="!loading &amp;&amp; job" style="display: none;">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-sm border p-8 mb-6 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-2 h-full bg-primary"></div>
            <div class="flex justify-between items-start gap-4 flex-col sm:flex-row">
                <div>
                    <span class="inline-block px-3 py-1 rounded-full text-sm font-semibold bg-blue-50 text-blue-700 mb-3" x-text="job?.department"></span>
                    <h1 class="text-3xl font-bold text-slate-900 mb-4" x-text="job?.title"></h1>
                    <div class="text-slate-500 flex items-center gap-4 text-sm font-medium">
                        <span class="flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Hạn nộp: <span x-text="job ? new Date(job.expiresAt).toLocaleDateString('vi-VN') : ''"></span>
                        </span>
                        <span class="flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            Trạng thái: <span class="text-green-600" x-text="job?.status"></span>
                        </span>
                    </div>
                </div>
                <div>
                    <template x-if="user &amp;&amp; ['ADMIN', 'HR'].includes(user.role)">
                        <a :href="'/jobs/' + job?.id + '/kanban'" class="inline-flex items-center justify-center bg-slate-800 text-white font-medium px-8 py-3 rounded-xl hover:bg-slate-900 transition-all w-full sm:w-auto">
                            Xem hồ sơ (Kanban)
                        </a>
                    </template>
                    <template x-if="!user || !['ADMIN', 'HR'].includes(user.role)">
                        <a :href="'/jobs/' + job?.id + '/apply'" class="inline-flex items-center justify-center bg-primary text-white font-medium px-8 py-3 rounded-xl shadow-lg shadow-blue-500/30 hover:bg-blue-700 hover:-translate-y-0.5 transition-all w-full sm:w-auto">
                            Ứng Tuyển Ngay
                        </a>
                    </template>
                </div>
            </div>
        </div>

        <!-- Body sections -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 space-y-6">
                <div class="bg-white rounded-xl shadow-sm border p-8">
                    <h2 class="text-xl font-bold text-slate-900 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Mô tả công việc
                    </h2>
                    <div class="prose max-w-none text-slate-600 space-y-4 whitespace-pre-line" x-text="job?.description"></div>
                </div>
            </div>
            
            <div class="space-y-6">
                <div class="bg-white rounded-xl shadow-sm border p-8">
                    <h2 class="text-lg font-bold text-slate-900 mb-4">Kỹ năng yêu cầu</h2>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="skill in (job?.requiredSkills || '').split(',').map(s => s.trim()).filter(Boolean)">
                            <span class="bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg text-sm font-medium border border-slate-200" x-text="skill"></span>
                        </template>
                    </div>
                </div>
                
                <div class="bg-slate-50 rounded-xl p-6 border border-slate-200">
                    <h3 class="font-bold text-slate-900 mb-2">Bạn có thắc mắc?</h3>
                    <p class="text-sm text-slate-600 mb-4">Vui lòng liên hệ bộ phận tuyển dụng nếu bạn có bất kỳ câu hỏi nào về vị trí này.</p>
                    <a href="mailto:hr@vthr.com" class="text-primary font-medium text-sm hover:underline">hr@vthr.com</a>
                </div>
            </div>
        </div>
    </div>
    
    <div x-show="!loading &amp;&amp; !job" class="text-center py-20 bg-white rounded-xl border mt-6" style="display: none;">
        <h2 class="text-2xl font-bold text-slate-800 mb-2">Không tìm thấy!</h2>
        <p class="text-slate-500 mb-6">Công việc này có thể đã đóng hoặc không tồn tại.</p>
        <a href="/jobs" class="text-primary hover:underline font-medium">Trở về Về danh sách</a>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const jobIdRaw = window.location.pathname.split('/')[2];
        /*]]>*/

        document.addEventListener('alpine:init', () => {
            Alpine.data('jobDetail', () => ({
                jobId: jobIdRaw,
                job: null,
                loading: true,
                async init() {
                    try {
                        const res = await api.fetchWithToken(`/jobs/${this.jobId}`);
                        this.job = res.data;
                    } catch (e) {
                        console.error('Failed to load job', e);
                    } finally {
                        this.loading = false;
                    }
                }
            }));
        });
    </script>
</section>
</html>
