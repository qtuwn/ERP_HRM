<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Khám phá Việc làm - VTHR', ~{::section})}">
<section class="max-w-7xl mx-auto py-8" x-data="jobList()">
    
    <div class="mb-8 bg-white p-8 rounded-xl shadow-sm border border-slate-200 text-center">
        <h1 class="text-3xl font-bold text-slate-900 mb-4">Khám phá Cơ hội nghề nghiệp</h1>
        <p class="text-slate-600 mb-6 max-w-2xl mx-auto">Tham gia đội ngũ của chúng tôi để cùng nhau kiến tạo những sản phẩm tuyệt vời. Tìm kiếm vị trí phù hợp với bạn bên dưới.</p>
        
        <div class="max-w-2xl mx-auto flex gap-4">
            <input type="text" placeholder="Tìm kiếm theo tiêu đề hoặc từ khóa..." class="flex-1 px-4 py-3 rounded-lg border focus:ring-2 focus:ring-primary focus:border-primary outline-none">
            <button class="bg-primary hover:bg-blue-700 text-white px-6 border-transparent py-3 rounded-lg font-medium transition-colors">
                Tìm kiếm
            </button>
        </div>
    </div>

    <!-- Loading State -->
    <div x-show="loading" class="flex justify-center py-20">
        <svg class="animate-spin h-8 w-8 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
    </div>

    <!-- Job Grid -->
    <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" style="display: none;">
        <template x-for="job in jobs" :key="job.id">
            <div class="bg-white rounded-xl shadow-sm border p-6 hover:shadow-md transition-shadow flex flex-col h-full">
                <div class="mb-4">
                    <span class="inline-block px-3 py-1 rounded-full text-xs font-semibold bg-blue-50 text-blue-700 mb-3" x-text="job.department"></span>
                    <h3 class="text-xl font-bold text-slate-900 mb-2 truncate" x-text="job.title"></h3>
                    <p class="text-slate-600 text-sm line-clamp-3" x-text="job.description"></p>
                </div>
                
                <div class="mt-auto pt-4 border-t flex items-center justify-between">
                    <span class="text-xs text-slate-500 font-medium">
                        Hạn nộp: <span x-text="new Date(job.expiresAt).toLocaleDateString('vi-VN')"></span>
                    </span>
                    <a :href="'/jobs/' + job.id" class="text-primary font-medium hover:text-blue-800 text-sm flex items-center gap-1">
                        Chi tiết
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </a>
                </div>
            </div>
        </template>
        
        <div x-show="jobs.length === 0" class="col-span-full text-center py-20 text-slate-500">
            Hiện chưa có công việc nào đang mở.
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('jobList', () => ({
                jobs: [],
                loading: true,
                async init() {
                    try {
                        const res = await api.fetchWithToken('/jobs');
                        this.jobs = res.data.content;
                    } catch (e) {
                        console.error('Failed to load jobs', e);
                    } finally {
                        this.loading = false;
                    }
                }
            }));
        });
    </script>
</section>
</html>
