<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mã OTP xác thực - VTHR</title>
</head>
<body style="margin:0;padding:0;background:#f6f9fc;font-family:Arial,Helvetica,sans-serif;color:#0f172a;">
<div style="max-width:640px;margin:0 auto;padding:24px;">
    <div style="background:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb;">
        <div style="padding:20px 24px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;">
            <div style="font-size:16px;font-weight:700;letter-spacing:.2px;">VTHR Solutions</div>
            <div style="margin-top:6px;font-size:13px;opacity:.95;">Mã xác thực email</div>
        </div>

        <div style="padding:22px 24px;">
            <p style="margin:0 0 16px 0;font-size:14px;line-height:1.6;">
                Mã xác thực của bạn là:
            </p>

            <div style="text-align:center;margin:18px 0;">
                <div style="display:inline-block;padding:14px 18px;border-radius:12px;border:1px solid #dbeafe;background:#eff6ff;">
                    <span style="font-size:28px;letter-spacing:8px;font-weight:800;color:#1d4ed8;" th:text="${otp}">123456</span>
                </div>
            </div>

            <p style="margin:0;font-size:14px;line-height:1.6;">
                Mã này có hiệu lực trong 5 phút.
            </p>
        </div>
    </div>
</div>
</body>
</html>
